<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A2E"/>
      <stop offset="100%" stop-color="#1A1040"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0088CC"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#CC0066"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="2">
    <line x1="128" y1="140" x2="384" y2="140"/>
    <line x1="128" y1="200" x2="384" y2="200"/>
    <line x1="128" y1="260" x2="384" y2="260"/>
    <line x1="128" y1="320" x2="384" y2="320"/>
    <line x1="128" y1="380" x2="384" y2="380"/>
    <line x1="128" y1="140" x2="128" y2="380"/>
    <line x1="188" y1="140" x2="188" y2="380"/>
    <line x1="248" y1="140" x2="248" y2="380"/>
    <line x1="308" y1="140" x2="308" y2="380"/>
    <line x1="368" y1="140" x2="368" y2="380"/>
  </g>
  <!-- Player chip (cyan) -->
  <circle cx="218" cy="230" r="22" fill="url(#cyan)" opacity="0.9"/>
  <circle cx="218" cy="230" r="22" fill="none" stroke="#00D4FF" stroke-width="3" opacity="0.5"/>
  <!-- AI chip (magenta) -->
  <circle cx="308" cy="290" r="22" fill="url(#magenta)" opacity="0.9"/>
  <circle cx="308" cy="290" r="22" fill="none" stroke="#FF1493" stroke-width="3" opacity="0.5"/>
  <!-- Gold win line -->
  <line x1="218" y1="230" x2="308" y2="290" stroke="#FFD700" stroke-width="4" opacity="0.7" stroke-dasharray="8,6"/>
  <!-- Title -->
  <text x="256" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="url(#cyan)">SEQUENCE</text>
  <text x="256" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#00D4FF" opacity="0.5">STAR CHART</text>
</svg>
