<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 3rem;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.1rem;
      color: #aaa;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 900px;
    }

    .game-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      transition: transform 0.2s, background 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .game-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.1);
    }

    .game-card .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .game-card h2 {
      font-size: 1.3rem;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .game-card p {
      font-size: 0.9rem;
      color: #999;
    }

    .coming-soon {
      opacity: 0.6;
      pointer-events: none;
    }

    .coming-soon .badge {
      display: inline-block;
      background: #ffd700;
      color: #000;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-top: 0.5rem;
      font-weight: 600;
    }

    footer {
      margin-top: 3rem;
      color: #666;
      font-size: 0.85rem;
      text-align: center;
    }

    footer a { color: #888; }
  </style>
</head>
<body>
  <header>
    <h1>🎮 Games</h1>
    <p>Simple, single-page games — open and play instantly.</p>
  </header>

  <div class="games-grid">
    <a href="wild-run/" class="game-card">
      <div class="icon">🏞️</div>
      <h2>Wild Run</h2>
      <p>Dodge animals as you race your tractor through the wilderness!</p>
    </a>
    <a href="arrow-escape/" class="game-card">
      <div class="icon">🏹</div>
      <h2>Arrow Escape</h2>
      <p>Tap arrows to clear the grid — a relaxing nature-themed logic puzzle!</p>
    </a>
  </div>

  <footer>
    <p>Built with vanilla HTML/CSS/JS • <a href="https://github.com/amitsehgal29/games">GitHub</a></p>
  </footer>
</body>
</html>
