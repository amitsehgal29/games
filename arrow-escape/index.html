<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Arrow Escape</title>
  <meta name="description" content="A sleek logic puzzle — tap arrows in the right order to clear the grid">
  <meta property="og:title" content="Arrow Escape">
  <meta property="og:description" content="A sleek logic puzzle — tap arrows in the right order to clear the grid">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://amitsehgal29.github.io/games/arrow-escape/">
  <meta property="og:image" content="https://amitsehgal29.github.io/games/arrow-escape/icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0A0E1A;
      display: flex; justify-content: center; align-items: center;
      font-family: 'Outfit', system-ui, sans-serif;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    canvas { display: block; max-width: 480px; width: 100%; border-radius: 16px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
  "use strict";

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const MAX_W = 480;
  const GAME_W = 400;

  function resize() {
    const w = Math.min(window.innerWidth, MAX_W);
    canvas.width = w;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function scaleX(x) { return x * (canvas.width / GAME_W); }
  function scaleV(v) { return v * (canvas.width / GAME_W); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function rand(min, max) { return min + Math.random() * (max - min); }
  function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function safeLS(key, val) {
    try {
      if (val !== undefined) { localStorage.setItem(key, String(val)); return; }
      return localStorage.getItem(key);
    } catch(e) { return val !== undefined ? null : null; }
  }

  // ── Colors — Dark theme with neon accents ──
  const C = {
    bg1: '#0A0E1A', bg2: '#141829', bg3: '#1A1F33',
    surface: 'rgba(255,255,255,0.04)',
    border: 'rgba(255,255,255,0.08)',
    borderGlow: 'rgba(255,255,255,0.15)',
    cellEven: 'rgba(255,255,255,0.04)',
    cellOdd: 'rgba(255,255,255,0.02)',
    arrowBase: '#1E2440',
    arrowBorder: 'rgba(255,255,255,0.2)',
    dirColors: { up: '#FF6B6B', down: '#4ECDC4', left: '#FFD93D', right: '#6BCB77' },
    safeGlow: 'rgba(108,203,119,0.5)',
    dangerGlow: 'rgba(255,107,107,0.5)',
    heartFull: '#FF4757', heartEmpty: 'rgba(255,255,255,0.12)',
    text: '#FFFFFF', textDim: 'rgba(255,255,255,0.6)', textMuted: 'rgba(255,255,255,0.35)',
    accent: '#6C63FF', accentGlow: 'rgba(108,99,255,0.4)',
    overlay: 'rgba(10,14,26,0.85)',
    btnPrimary: '#6C63FF',
    btnSuccess: '#2ED573',
    btnDanger: '#FF4757',
  };

  // ── Directions ──
  const DIRS = {
    up:    { dx: 0, dy: -1, symbol: '↑', angle: -Math.PI/2 },
    down:  { dx: 0, dy: 1,  symbol: '↓', angle: Math.PI/2 },
    left:  { dx: -1, dy: 0, symbol: '←', angle: Math.PI },
    right: { dx: 1, dy: 0,  symbol: '→', angle: 0 },
  };
  const DIR_KEYS = Object.keys(DIRS);

  // ── State ──
  let state = 'title';
  let level = 1, gridCols = 3, gridRows = 4;
  let arrows = [];
  let animArrow = null, animProgress = 0;
  let highLevel = parseInt(safeLS('arrowescape_lv')) || 1;
  let elapsedTime = 0, lastFrameTime = performance.now();

  // Audio
  let audioCtx = null, muted = true;
  function initAudio() {
    if (!audioCtx) {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) { audioCtx = new AC(); if (audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{}); }
      } catch(e) { audioCtx = null; }
    } else if (audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    return audioCtx;
  }
  function playTone(f, e, d, t, v) {
    if (muted || !audioCtx) return;
    try {
      const ti = audioCtx.currentTime, o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = t || 'sine'; o.frequency.setValueAtTime(f, ti);
      if (e) o.frequency.linearRampToValueAtTime(e, ti + d);
      g.gain.setValueAtTime(v||0.1, ti); g.gain.exponentialRampToValueAtTime(0.001, ti+d);
      o.connect(g); g.connect(audioCtx.destination); o.start(ti); o.stop(ti+d);
    } catch(x) {}
  }
  function sfxTap() { playTone(520, 780, 0.1, 'sine', 0.08); }
  function sfxInvalid() { playTone(140, 70, 0.25, 'triangle', 0.1); }
  function sfxSlide() { playTone(400, 600, 0.3, 'sine', 0.06); }
  function sfxWin() {
    playTone(523,659,0.1,'sine',0.1);
    setTimeout(()=>{if(!muted&&audioCtx)playTone(659,784,0.1,'sine',0.1);},100);
    setTimeout(()=>{if(!muted&&audioCtx)playTone(784,1047,0.15,'sine',0.12);},200);
  }
  function sfxLose() { playTone(200,50,0.5,'sawtooth',0.12); }
  function sfxClick() { playTone(800,600,0.04,'sine',0.05); }

  function toggleMute() {
    muted = !muted; safeLS('arrowescape_muted', muted?'1':'0'); initAudio();
  }

  // ── Grid — vertical rectangle ──
  function getGridBounds() {
    const gridW = scaleX(300);
    const cellSize = gridW / gridCols;
    const gridH = cellSize * gridRows;
    const bx = (canvas.width - gridW) / 2;
    const by = Math.max(scaleV(20), (canvas.height - gridH) / 2 - scaleV(20));
    return { bx, by, gridW, gridH, cellSize };
  }

  function cellFromPoint(px, py) {
    const { bx, by, cellSize } = getGridBounds();
    const col = Math.floor((px - bx) / cellSize);
    const row = Math.floor((py - by) / cellSize);
    if (col >= 0 && col < gridCols && row >= 0 && row < gridRows) return { row, col };
    return null;
  }

  function hasClearPath(row, col, dir, excludeIdx) {
    const d = DIRS[dir]; let r = row + d.dy, c = col + d.dx;
    while (r >= 0 && r < gridRows && c >= 0 && c < gridCols) {
      if (arrows.findIndex((a, i) => i !== excludeIdx && a.alive && a.row === r && a.col === c) >= 0) return false;
      r += d.dy; c += d.dx;
    }
    return true;
  }

  function generateLevel(cols, rows, numArrows) {
    const totalCells = cols * rows;
    for (let attempt = 0; attempt < 300; attempt++) {
      const test = [], used = new Set();
      for (let i = 0; i < numArrows; i++) {
        let r, c, k;
        do { r = randInt(0, rows-1); c = randInt(0, cols-1); k = `${r},${c}`; }
        while (used.has(k) && used.size < totalCells);
        if (used.size >= totalCells) break;
        used.add(k);
        test.push({ row: r, col: c, dir: DIR_KEYS[randInt(0,3)], alive: true });
      }
      // Validate
      const sim = test.map(a=>({...a}));
      let valid = true;
      for (let step = 0; step < sim.length; step++) {
        const safe = sim.filter((a,i) => {
          if (!a.alive) return false;
          const d = DIRS[a.dir]; let rr = a.row+d.dy, cc = a.col+d.dx;
          while (rr>=0 && rr<rows && cc>=0 && cc<cols) {
            if (sim.find(s=>s!==a&&s.alive&&s.row===rr&&s.col===cc)) return false;
            rr+=d.dy; cc+=d.dx;
          }
          return true;
        });
        if (safe.length === 0) { valid = false; break; }
        safe[0].alive = false;
      }
      if (valid) return test;
    }
    return [{row:0,col:0,dir:'right',alive:true},{row:1,col:1,dir:'down',alive:true}];
  }

  function startLevel(lvl) {
    level = lvl;
    gridCols = clamp(3 + Math.floor((lvl-1)/5), 3, 5);
    gridRows = clamp(4 + Math.floor((lvl-1)/2), 4, 9);
    const numArrows = clamp(4 + lvl, 4, gridCols*gridRows - 1);
    arrows = generateLevel(gridCols, gridRows, numArrows);
    state = 'playing';
    animArrow = null;
  }

  // ── Drawing ──
  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, C.bg1); grad.addColorStop(0.5, C.bg2); grad.addColorStop(1, C.bg3);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle geometric dots
    ctx.fillStyle = 'rgba(255,255,255,0.015)';
    for (let y = 0; y < canvas.height; y += scaleV(30)) {
      for (let x = 0; x < canvas.width; x += scaleV(30)) {
        ctx.beginPath();
        ctx.arc(x + (y % (scaleV(60)) === 0 ? scaleV(15) : 0), y, scaleV(1), 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawGrid() {
    const { bx, by, gridW, gridH, cellSize } = getGridBounds();

    // Grid background
    ctx.fillStyle = C.surface;
    ctx.strokeStyle = C.border;
    ctx.lineWidth = scaleV(1.5);
    roundRect(bx - scaleV(4), by - scaleV(4), gridW + scaleV(8), gridH + scaleV(8), scaleV(12));
    ctx.fill();
    ctx.stroke();

    // Cells
    for (let row = 0; row < gridRows; row++) {
      for (let col = 0; col < gridCols; col++) {
        const cx = bx + col * cellSize, cy = by + row * cellSize;
        const inset = cellSize * 0.08;
        ctx.fillStyle = (row + col) % 2 === 0 ? C.cellEven : C.cellOdd;
        roundRect(cx + inset, cy + inset, cellSize - inset*2, cellSize - inset*2, scaleV(6));
        ctx.fill();
      }
    }
  }

  function drawArrow(a, idx) {
    if (!a.alive && a.opacity <= 0) return;
    const { bx, by, cellSize } = getGridBounds();
    const s = cellSize * 0.38;
    const cx = bx + a.col * cellSize + cellSize/2;
    const cy = by + a.row * cellSize + cellSize/2;
    let x = cx, y = cy, alpha = a.alive ? 1 : a.opacity;
    if (a.slideX !== undefined) { x = a.slideX; y = a.slideY; }

    ctx.save();
    ctx.globalAlpha = alpha;

    // Outer glow ring
    const dirColor = C.dirColors[a.dir] || C.accent;
    ctx.shadowColor = dirColor;
    ctx.shadowBlur = s * 0.5;

    // Base circle
    const bgrad = ctx.createRadialGradient(x - s*0.1, y - s*0.1, s*0.05, x, y, s);
    bgrad.addColorStop(0, '#2A3050'); bgrad.addColorStop(1, C.arrowBase);
    ctx.fillStyle = bgrad;
    ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Border
    ctx.strokeStyle = dirColor;
    ctx.lineWidth = scaleV(2.5);
    ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI*2); ctx.stroke();

    // Direction arrow
    ctx.fillStyle = dirColor;
    ctx.font = `900 ${s * 1.3}px 'Outfit', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(DIRS[a.dir].symbol, x, y);

    // Safe indicator — glowing border
    if (state === 'playing' && a.alive && hasClearPath(a.row, a.col, a.dir, idx)) {
      ctx.strokeStyle = C.safeGlow;
      ctx.lineWidth = scaleV(3);
      ctx.setLineDash([scaleV(4), scaleV(3)]);
      ctx.beginPath(); ctx.arc(cx, cy, s + scaleV(6), 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();
  }

  function drawHUD() {
    // Level badge — top right
    const badgeX = scaleX(GAME_W - 20);
    ctx.fillStyle = C.surface;
    ctx.strokeStyle = C.borderGlow;
    ctx.lineWidth = scaleV(1);
    roundRect(badgeX - scaleX(60), scaleV(8), scaleX(60), scaleV(28), scaleV(14));
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = C.text;
    ctx.font = `700 ${scaleV(12)}px 'Outfit', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`Lv ${level}`, badgeX - scaleX(30), scaleV(22));

    // Grid size — top left
    ctx.fillStyle = C.textDim;
    ctx.font = `600 ${scaleV(11)}px 'Outfit', system-ui, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(`${gridCols}×${gridRows}`, scaleX(18), scaleV(22));
  }

  function drawTitleScreen() {
    ctx.fillStyle = C.overlay; ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2, cy = canvas.height * 0.25;

    // Decorative circle
    ctx.strokeStyle = 'rgba(108,99,255,0.1)'; ctx.lineWidth = scaleV(2);
    ctx.beginPath(); ctx.arc(cx, cy + scaleV(10), scaleV(90), 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = 'rgba(108,99,255,0.06)';
    ctx.beginPath(); ctx.arc(cx, cy + scaleV(10), scaleV(120), 0, Math.PI*2); ctx.stroke();

    // Title
    const tg = ctx.createLinearGradient(cx, cy - scaleV(30), cx, cy + scaleV(30));
    tg.addColorStop(0, '#FFFFFF'); tg.addColorStop(0.5, '#A8B0FF'); tg.addColorStop(1, C.accent);
    ctx.fillStyle = tg;
    ctx.font = `900 ${scaleV(44)}px 'Outfit', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('ARROW', cx, cy - scaleV(18));
    ctx.fillText('ESCAPE', cx, cy + scaleV(32));

    ctx.fillStyle = C.textDim;
    ctx.font = `500 ${scaleV(13)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText('A sleek logic puzzle', cx, cy + scaleV(72));

    // How to play — clean card
    const cardW = scaleX(290), cardH = scaleV(72);
    const cardX = cx - cardW/2, cardY = cy + scaleV(95);
    ctx.fillStyle = C.surface; ctx.strokeStyle = C.border;
    ctx.lineWidth = scaleV(1);
    roundRect(cardX, cardY, cardW, cardH, scaleV(14)); ctx.fill(); ctx.stroke();

    ctx.fillStyle = C.accent;
    ctx.font = `700 ${scaleV(12)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText('HOW TO PLAY', cx, cardY + scaleV(22));
    ctx.fillStyle = C.textDim;
    ctx.font = `500 ${scaleV(10.5)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText('Tap arrows to slide them off the grid', cx, cardY + scaleV(44));
    ctx.fillText('Hit another arrow → restart level', cx, cardY + scaleV(60));

    // Start button
    const btnW = scaleX(190), btnH = scaleV(52);
    const btnX = cx - btnW/2, btnY = cardY + cardH + scaleV(28);
    const pulse = 1 + Math.sin(elapsedTime * 3) * 0.03;
    ctx.shadowColor = C.accentGlow; ctx.shadowBlur = scaleV(20)*pulse;
    const bg = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
    bg.addColorStop(0, C.accent); bg.addColorStop(1, '#5A52D5');
    ctx.fillStyle = bg;
    roundRect(btnX, btnY, btnW, btnH, btnH/2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#FFF';
    ctx.font = `800 ${scaleV(18)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText('START', cx, btnY + btnH/2);

    if (highLevel > 1) {
      ctx.fillStyle = C.textMuted;
      ctx.font = `500 ${scaleV(11)}px 'Outfit', system-ui, sans-serif`;
      ctx.fillText(`Best: Level ${highLevel}`, cx, btnY + btnH + scaleV(20));
    }

    canvas._startBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  }

  function drawLevelComplete() {
    ctx.fillStyle = C.overlay; ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width/2, cy = canvas.height*0.33;
    ctx.fillStyle = '#2ED573';
    ctx.font = `900 ${scaleV(32)}px 'Outfit', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('CLEARED!', cx, cy);

    ctx.fillStyle = C.text;
    ctx.font = `600 ${scaleV(16)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText(`Level ${level} complete`, cx, cy + scaleV(38));

    const btnW = scaleX(190), btnH = scaleV(52);
    const btnX = cx - btnW/2, btnY = cy + scaleV(70);
    const bg = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
    bg.addColorStop(0, C.btnSuccess); bg.addColorStop(1, '#1FA855');
    ctx.fillStyle = bg; roundRect(btnX, btnY, btnW, btnH, btnH/2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `800 ${scaleV(18)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText('NEXT', cx, btnY + btnH/2);
    canvas._nextBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  }

  function drawMuteButton() {
    const r = scaleV(18), x = scaleX(GAME_W - 20) - r, y = scaleV(85);
    canvas._muteBtn = { x: x-r, y: y-r, w: r*2, h: r*2 };
    ctx.fillStyle = C.surface; ctx.strokeStyle = C.border;
    ctx.lineWidth = scaleV(1);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = C.textDim;
    ctx.font = `${r*0.9}px system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(muted ? '🔇' : '🔊', x, y);
  }

  // ── Logic ──
  function tapArrow(row, col) {
    if (state !== 'playing') return;
    const idx = arrows.findIndex(a => a.alive && a.row === row && a.col === col);
    if (idx < 0) return;

    const arrow = arrows[idx];
    initAudio(); sfxTap();

    if (!hasClearPath(row, col, arrow.dir, idx)) {
      // Wrong tap — restart level immediately
      sfxInvalid(); sfxLose();
      arrow.shakeTimer = 0.3;
      setTimeout(() => startLevel(level), 400);
      state = 'animating'; // block further taps during shake
      return;
    }

    state = 'animating'; animArrow = arrow; animProgress = 0;
    sfxSlide(); arrow.alive = false;

    if (arrows.every(a => !a.alive)) {
      setTimeout(() => {
        state = 'levelComplete'; sfxWin();
        if (level >= highLevel) { highLevel = level+1; safeLS('arrowescape_lv', String(highLevel)); }
      }, 400);
    } else {
      setTimeout(() => { state = 'playing'; animArrow = null; }, 300);
    }
  }

  function update(dt) {
    const dtC = Math.max(0, Math.min(dt, 0.1));
    if (state === 'animating' && animArrow) {
      animProgress += dtC * 4;
      if (animProgress >= 1) animProgress = 1;
      const d = DIRS[animArrow.dir];
      const { bx, by, cellSize } = getGridBounds();
      const sx = bx + animArrow.col*cellSize + cellSize/2;
      const sy = by + animArrow.row*cellSize + cellSize/2;
      const dist = Math.max(gridSize*cellSize, canvas.width);
      animArrow.slideX = sx + d.dx*dist*animProgress;
      animArrow.slideY = sy + d.dy*dist*animProgress;
      animArrow.opacity = clamp(1 - animProgress*1.2, 0, 1);
    }
    arrows.forEach(a => { if (a.shakeTimer > 0) a.shakeTimer -= dtC; });
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    drawGrid();

    // Draw arrows
    arrows.forEach((a, i) => {
      if (state === 'playing' || state === 'animating' || state === 'over' || state === 'levelComplete')
        drawArrow(a, i);
    });

    // Shake red flash
    ctx.save();
    arrows.forEach(a => {
      if (a.shakeTimer > 0) {
        const { bx, by, cellSize } = getGridBounds();
        const cx = bx + a.col*cellSize + cellSize/2 + (Math.random()-0.5)*a.shakeTimer*8;
        const cy = by + a.row*cellSize + cellSize/2 + (Math.random()-0.5)*a.shakeTimer*8;
        ctx.fillStyle = `rgba(255,71,87,${a.shakeTimer*0.4})`;
        ctx.beginPath(); ctx.arc(cx, cy, cellSize*0.38, 0, Math.PI*2); ctx.fill();
      }
    });
    ctx.restore();

    if (state === 'playing' || state === 'animating') drawHUD();
    if (state === 'title') drawTitleScreen();
    if (state === 'levelComplete') drawLevelComplete();
    drawMuteButton();
  }

  function gameLoop(ts) {
    const dt = (ts - lastFrameTime) / 1000;
    lastFrameTime = ts; elapsedTime += dt;
    update(dt); render();
    requestAnimationFrame(gameLoop);
  }

  // ── Input ──
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    for (const t of e.changedTouches) {
      const tx = (t.clientX - rect.left) * (canvas.width / rect.width);
      const ty = (t.clientY - rect.top) * (canvas.height / rect.height);
      if (canvas._muteBtn) {
        const b = canvas._muteBtn;
        if (tx>=b.x && tx<=b.x+b.w && ty>=b.y && ty<=b.y+b.h) { toggleMute(); return; }
      }
      if (state === 'title' && canvas._startBtn) {
        const b = canvas._startBtn;
        if (tx>=b.x && tx<=b.x+b.w && ty>=b.y && ty<=b.y+b.h) { startLevel(1); return; }
      }
      if (state === 'levelComplete' && canvas._nextBtn) {
        const b = canvas._nextBtn;
        if (tx>=b.x && tx<=b.x+b.w && ty>=b.y && ty<=b.y+b.h) { startLevel(level+1); return; }
      }
      if (state === 'playing') {
        const cell = cellFromPoint(tx, ty);
        if (cell) tapArrow(cell.row, cell.col);
      }
    }
  }, { passive: false });

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);
    if (canvas._muteBtn) {
      const b = canvas._muteBtn;
      if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) { toggleMute(); return; }
    }
    if (state==='title' && canvas._startBtn) {
      const b = canvas._startBtn;
      if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) { startLevel(1); return; }
    }
    if (state==='levelComplete' && canvas._nextBtn) {
      const b = canvas._nextBtn;
      if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) { startLevel(level+1); return; }
    }
    // Arrow tap for desktop/laptop
    if (state === 'playing') {
      const cell = cellFromPoint(mx, my);
      if (cell) tapArrow(cell.row, cell.col);
    }
  });

  // ── Init ──
  function init() {
    const sm = safeLS('arrowescape_muted');
    if (sm !== null) muted = sm === '1';
    resize(); render();
    lastFrameTime = performance.now();
    requestAnimationFrame(gameLoop);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
  init();
})();
</script>
</body>
</html>
