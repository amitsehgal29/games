<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Wild Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a1a2e;
      display: flex; justify-content: center; align-items: center;
      font-family: 'Fredoka', 'Segoe UI', system-ui, sans-serif;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    canvas { display: block; max-width: 500px; width: 100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
  "use strict";

  // ═══════════════════════════════════════
  // CANVAS SETUP
  // ═══════════════════════════════════════
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const MAX_W = 480;
  const GAME_W = 400;

  function resize() {
    const w = Math.min(window.innerWidth, MAX_W);
    canvas.width = w;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ═══════════════════════════════════════
  // CONSTANTS
  // ═══════════════════════════════════════
  const GRASS_W = 60;
  const ROAD_X  = GRASS_W;
  const LANES   = 4;
  const ROAD_W  = GAME_W - GRASS_W * 2;
  const LANE_W  = ROAD_W / LANES;
  const LANE_CX = Array.from({length: LANES}, (_, i) => ROAD_X + LANE_W * i + LANE_W / 2);

  const PLAYER_Y_RATIO = 0.80;
  const BASE_SPEED  = 140;
  const MAX_SPEED   = 480;
  const SPEED_STEP  = 22;
  const DIST_PER_STEP = 600;

  const FUEL_MAX     = 100;
  const FUEL_DRAIN   = 3.0;
  const FUEL_PICKUP  = 18;

  const OBSTACLE_MIN_GAP = 0.50;
  const COLLECTIBLE_CHANCE = 0.38;
  const GAP_DIST_BASE = OBSTACLE_MIN_GAP * BASE_SPEED * 1.2;
  const LANE_SWITCH_SPEED = 14; // lerp speed for smooth lane changes

  // ═══════════════════════════════════════
  // COLOR PALETTE — vibrant HD nature tones
  // ═══════════════════════════════════════
  const C = {
    skyTop:    '#1565C0',   // Deep rich azure blue
    skyMid:    '#42A5F5',   // Vibrant clear sky blue
    skyBot:    '#F5E6A3',   // Warm golden horizon glow
    cloud:     'rgba(255,255,255,0.92)',
    cloudShad: 'rgba(180,200,220,0.45)',
    mtFar:     '#5A8F7A',   // Rich blue-green distance
    mtNear:    '#3D7A3C',   // Deep forest green
    mtSnow:    '#F0F8F8',   // Bright clean snow caps
    grass1:    '#43A047',   // Vibrant rich green
    grass2:    '#2E7D32',   // Deep vibrant green
    grassEdg:  '#66BB6A',   // Bright green edge
    dirt:      '#DEB06A',   // Warm golden sand
    dirtDark:  '#C89440',   // Richer dark dirt
    dirtEdge:  '#8A6A30',   // Dark edge contrast
    gravel:    'rgba(140,110,60,0.45)',
    line:      'rgba(255,255,255,0.60)',
    jeepBody:  '#E8C88A',   // Brighter jeep body
    jeepDark:  '#C8A060',   // Richer dark trim
    jeepCabin: '#8B6B4A',
    jeepBump:  '#4A4A4A',   // Darker bumper
    jeepCage:  '#2A2A2A',
    wheel:     '#1A1A1A',   // Darker wheels
    wheelTread:'#0D0D0D',
    wheelHub:  '#B0B0B0',   // Brighter hub
    boulder1:  '#A89888',   // Brighter stone
    boulder2:  '#7A6E64',   // Darker shadow
    boulderMos:'#5A8A3A',   // Brighter moss
    log:       '#B8824A',   // Richer bark
    logDark:   '#7A4A28',   // Darker bark shadow
    logEnd:    '#D4B090',   // Brighter end grain
    deerBody:  '#D4A86C',   // Warmer fur
    deerBelly: '#F5E8D4',   // Brighter belly
    deerLeg:   '#8B6040',
    puddle1:   '#5A9EC8',   // Richer water blue
    puddle2:   '#78B8D8',   // Brighter water
    puddleRim: '#4A8AAA',   // Darker rim
    fruit:     '#FF5722',   // Brighter orange
    fruitGlow: '#FF9E00',   // Brighter glow
    leaf:      '#43A047',   // Match vibrant grass
    fuelCan:   '#D32F2F',   // Deeper red
    fuelLabel: '#FFF',
    hudBg:     'rgba(0,0,0,0.65)',
    hudText:   '#FFF',
    danger:    '#FF1744',   // Brighter danger red
    warning:   '#FFB300',   // Brighter amber
    safe:      '#00E676',   // Brighter safe green
  };

  // ═══════════════════════════════════════
  // GAME STATE
  // ═══════════════════════════════════════
  let state = 'title';
  let score = 0;
  let distance = 0;
  let speed = BASE_SPEED;
  let fuel = FUEL_MAX;
  let playerLane = 1;
  let prevLane = 1;                 // previous lane (to detect switches)
  let playerX = LANE_CX[1];         // target position (game-space)
  let displayX = LANE_CX[1];        // visual position (smoothed)
  let tiltAngle = 0;                // jeep lean
  let squashScale = 1;              // squash/stretch during lane switches
  let switchDustTimer = 0;          // dust burst after lane switch
  let playerY = 0;
  let obstacles = [];
  let collectibles = [];
  let particles = [];
  let clouds = [];
  let birds = [];
  let treesL = [];
  let treesR = [];
  let frameCount = 0;
  let highScore = parseInt(safeLS('wildrun_hs')) || 0;
  let highDist  = parseInt(safeLS('wildrun_hd')) || 0;
  let lastObstacleDist = 0;
  let nitroActive = false;
  let nitroFuel = 0;
  let shakeTimer = 0;
  let nearMissTimer = 0;
  let lastFrameTime = performance.now();
  let laneSwitchCooldown = 0;
  let lastDt = 0.016;              // stored for render-only consumers (clouds)

  // Audio
  let audioCtx = null;
  let muted = true;                 // default muted
  let engineNodes = [];
  let engineGain = null;

  // ═══════════════════════════════════════
  // AUDIO — synthesized sound effects
  // ═══════════════════════════════════════
  function initAudio() {
    if (!audioCtx) {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      } catch(e) { audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, endFreq, duration, type, vol, rampDown) {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    if (endFreq) osc.frequency.linearRampToValueAtTime(endFreq, t + duration);
    gain.gain.setValueAtTime(vol || 0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + (rampDown || duration));
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);
  }

  function playNoise(duration, vol, lowFreq, highFreq) {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const bufferSize = Math.floor(audioCtx.sampleRate * duration);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const bandpass = audioCtx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.value = (lowFreq + highFreq) / 2;
    bandpass.Q.value = 1.5;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol || 0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    source.connect(bandpass);
    bandpass.connect(gain);
    gain.connect(audioCtx.destination);
    source.start(t);
    source.stop(t + duration);
  }

  function sfxSwitch() {
    playNoise(0.1, 0.07, 200, 800);
    playTone(150, 300, 0.08, 'sawtooth', 0.035, 0.08);
  }

  function sfxPickup() {
    playTone(660, 880, 0.12, 'sine', 0.12, 0.12);
    setTimeout(() => { if (!muted && audioCtx) playTone(880, 1100, 0.1, 'sine', 0.1, 0.1); }, 60);
  }

  function sfxFuelPickup() {
    playTone(330, 440, 0.15, 'triangle', 0.1, 0.15);
    playTone(440, 550, 0.12, 'sine', 0.07, 0.12);
  }

  function sfxCrash() {
    playTone(60, 30, 0.4, 'sawtooth', 0.22, 0.4);
    playNoise(0.3, 0.15, 50, 300);
  }

  function sfxNearMiss() {
    playNoise(0.08, 0.04, 400, 1200);
  }

  function sfxClick() {
    playTone(800, 600, 0.04, 'sine', 0.06, 0.04);
  }

  function startEngine() {
    if (muted || !audioCtx || engineNodes.length > 0) return;
    const t = audioCtx.currentTime;

    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 45;
    engineNodes.push(osc);

    const osc2 = audioCtx.createOscillator();
    osc2.type = 'triangle';
    osc2.frequency.value = 82;
    engineNodes.push(osc2);

    const bs = audioCtx.createBufferSource();
    const bufSize = audioCtx.sampleRate * 2;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
    bs.buffer = buf;
    bs.loop = true;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = 60;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.3, t);
    engineNodes.push(bs);

    engineGain = audioCtx.createGain();
    engineGain.gain.setValueAtTime(0.018, t);

    osc.connect(engineGain);
    osc2.connect(engineGain);
    bs.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(engineGain);
    engineGain.connect(audioCtx.destination);

    osc.start(t);
    osc2.start(t);
    bs.start(t);
  }

  function stopEngine() {
    engineNodes.forEach(n => { try { n.stop(); } catch(e) {} });
    engineNodes = [];
    engineGain = null;
  }

  function updateEngine(spd) {
    if (muted || !audioCtx || engineNodes.length === 0) return;
    const freq = 40 + (spd / MAX_SPEED) * 35;
    const vol = 0.006 + (spd / MAX_SPEED) * 0.022;
    engineNodes.forEach(n => {
      if (n.frequency) n.frequency.setValueAtTime(freq, audioCtx.currentTime);
    });
    if (engineGain) engineGain.gain.setValueAtTime(vol, audioCtx.currentTime);
  }

  function toggleMute() {
    muted = !muted;
    safeLS('wildrun_muted', muted ? '1' : '0');
    if (muted) {
      stopEngine();
    } else {
      initAudio();
      if (state === 'playing') startEngine();
    }
  }

  // ═══════════════════════════════════════
  // HELPERS
  // ═══════════════════════════════════════
  function rand(min, max) { return min + Math.random() * (max - min); }
  function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function safeLS(key, val) {
    try { if (val !== undefined) safeLS(key, val); else return safeLS(key); }
    catch(e) { return val !== undefined ? null : null; }
  }

  function scaleX(x) { return x * (canvas.width / GAME_W); }
  function scaleY(y) { return y * (canvas.width / GAME_W); }
  function scaleV(v) { return v * (canvas.width / GAME_W); }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ═══════════════════════════════════════
  // DRAWING — SKY & ATMOSPHERE
  // ═══════════════════════════════════════
  function spawnCloud() {
    return {
      x: rand(-120, GAME_W + 60),
      y: rand(10, canvas.height * 0.2),
      w: rand(50, 110),
      speed: rand(8, 20),
      opacity: rand(0.4, 0.85),
    };
  }

  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, C.skyTop);
    grad.addColorStop(0.35, C.skyMid);
    grad.addColorStop(0.6, C.skyBot);
    grad.addColorStop(0.75, C.grass1);
    grad.addColorStop(1, C.grass2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawClouds(dt) {
    clouds.forEach(c => {
      c.x += c.speed * dt;
      if (c.x > GAME_W + 140) c.x = -140;
      const cx = scaleX(c.x), cy = c.y;
      const w = scaleV(c.w), h = w * 0.4;

      ctx.globalAlpha = c.opacity;
      // Cloud body (overlapping ellipses)
      ctx.fillStyle = C.cloud;
      ctx.beginPath();
      ctx.arc(cx, cy, h * 0.7, 0, Math.PI * 2);
      ctx.arc(cx - w * 0.25, cy + h * 0.1, h * 0.55, 0, Math.PI * 2);
      ctx.arc(cx + w * 0.22, cy + h * 0.05, h * 0.6, 0, Math.PI * 2);
      ctx.arc(cx - w * 0.12, cy - h * 0.2, h * 0.5, 0, Math.PI * 2);
      ctx.arc(cx + w * 0.1, cy - h * 0.15, h * 0.5, 0, Math.PI * 2);
      ctx.fill();

      // Shadow
      ctx.fillStyle = C.cloudShad;
      ctx.beginPath();
      ctx.arc(cx, cy + h * 0.2, h * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  function drawMountains() {
    // Far mountains with snow caps
    ctx.fillStyle = C.mtFar;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.32);
    for (let x = 0; x <= canvas.width; x += 2) {
      const y = canvas.height * 0.32
        - Math.sin(x * 0.015) * 32
        - Math.sin(x * 0.007 + 1.2) * 26
        - Math.sin(x * 0.035) * 12;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height * 0.4);
    ctx.lineTo(0, canvas.height * 0.4);
    ctx.closePath();
    ctx.fill();

    // Snow caps on far peaks
    ctx.fillStyle = C.mtSnow;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.32);
    for (let x = 0; x <= canvas.width; x += 2) {
      const baseY = canvas.height * 0.32
        - Math.sin(x * 0.015) * 32
        - Math.sin(x * 0.007 + 1.2) * 26
        - Math.sin(x * 0.035) * 12;
      const snowY = baseY + 18;
      ctx.lineTo(x, Math.min(baseY, snowY - Math.sin(x * 0.02) * 8));
    }
    ctx.lineTo(canvas.width, canvas.height * 0.4);
    ctx.lineTo(0, canvas.height * 0.4);
    ctx.closePath();
    ctx.fill();

    // Near hills
    ctx.fillStyle = C.mtNear;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.42);
    for (let x = 0; x <= canvas.width; x += 2) {
      const y = canvas.height * 0.42
        - Math.sin(x * 0.02 + 2.5) * 22
        - Math.sin(x * 0.008) * 16
        - Math.sin(x * 0.05 + 1) * 8;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height * 0.54);
    ctx.lineTo(0, canvas.height * 0.54);
    ctx.closePath();
    ctx.fill();
  }

  function drawBirds() {
    birds.forEach(b => {
      const bx = scaleX(b.x), by = b.y;
      const wingSpan = scaleV(b.size);
      const wingUp = Math.sin(frameCount * b.flapSpeed + b.phase) * wingSpan * 0.4;

      ctx.strokeStyle = '#3A3A3A';
      ctx.lineWidth = scaleV(1.5);
      ctx.lineCap = 'round';
      // Left wing
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.quadraticCurveTo(bx - wingSpan * 0.5, by - wingUp, bx - wingSpan, by * 1.02);
      ctx.stroke();
      // Right wing
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.quadraticCurveTo(bx + wingSpan * 0.5, by - wingUp, bx + wingSpan, by * 1.02);
      ctx.stroke();
    });
  }

  // ═══════════════════════════════════════
  // DRAWING — LANDSCAPE
  // ═══════════════════════════════════════
  function drawGrass(x, w) {
    const grad = ctx.createLinearGradient(x, 0, x + w, 0);
    grad.addColorStop(0, C.grass1);
    grad.addColorStop(0.3, C.grassEdg);
    grad.addColorStop(0.7, C.grassEdg);
    grad.addColorStop(1, C.grass1);
    ctx.fillStyle = grad;
    ctx.fillRect(x, 0, w, canvas.height);

    // Subtle texture
    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 1;
    for (let yy = 0; yy < canvas.height; yy += 5) {
      ctx.beginPath();
      ctx.moveTo(x, yy);
      ctx.lineTo(x + w, yy + Math.sin(yy * 0.35 + x) * 2.5);
      ctx.stroke();
    }
  }

  function drawRoad() {
    const sx = scaleX(ROAD_X);
    const sw = scaleX(ROAD_W);

    // Main surface
    const grad = ctx.createLinearGradient(sx, 0, sx + sw, 0);
    grad.addColorStop(0, C.dirtEdge);
    grad.addColorStop(0.12, C.dirtDark);
    grad.addColorStop(0.3, C.dirt);
    grad.addColorStop(0.7, C.dirt);
    grad.addColorStop(0.88, C.dirtDark);
    grad.addColorStop(1, C.dirtEdge);
    ctx.fillStyle = grad;
    ctx.fillRect(sx, 0, sw, canvas.height);

    // Gravel specks
    const dotSpacing = 14;
    for (let yy = (frameCount * 4) % dotSpacing; yy < canvas.height; yy += dotSpacing) {
      for (let xx = sx + 10; xx < sx + sw - 10; xx += dotSpacing + rand(-5, 5)) {
        ctx.fillStyle = C.gravel;
        ctx.beginPath();
        ctx.arc(xx + rand(-1.5, 1.5), yy + rand(-1.5, 1.5), 0.6 + Math.random() * 0.9, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Road edge — solid white lines
    ctx.strokeStyle = 'rgba(255,255,255,0.40)';
    ctx.lineWidth = scaleV(3);
    [sx + scaleV(1.5), sx + sw - scaleV(1.5)].forEach(ex => {
      ctx.beginPath();
      ctx.moveTo(ex, 0);
      ctx.lineTo(ex, canvas.height);
      ctx.stroke();
    });

    // Grass tufts at road edge
    ctx.fillStyle = C.grassEdg;
    for (let yy = (frameCount * 4) % 30; yy < canvas.height; yy += 30) {
      const lx = sx + rand(-2, 3);
      const rx = sx + sw + rand(-3, 2);
      [lx, rx].forEach(gx => {
        ctx.beginPath();
        ctx.moveTo(gx, yy);
        ctx.lineTo(gx + rand(-5, 5), yy - rand(6, 14));
        ctx.lineTo(gx + rand(-3, 3), yy);
        ctx.fill();
      });
    }

    // Lane dashes
    ctx.strokeStyle = C.line;
    ctx.lineWidth = scaleV(2.2);
    ctx.setLineDash([scaleV(24), scaleV(16)]);
    for (let i = 1; i < LANES; i++) {
      const lx = scaleX(ROAD_X + LANE_W * i);
      ctx.beginPath();
      ctx.moveTo(lx, 0);
      ctx.lineTo(lx, canvas.height);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // ═══════════════════════════════════════
  // DRAWING — TREES (two varieties)
  // ═══════════════════════════════════════
  function spawnTree(side) {
    const xRange = side === 'L' ? [6, GRASS_W - 8] : [GAME_W - GRASS_W + 8, GAME_W - 6];
    return {
      x: rand(xRange[0], xRange[1]),
      y: rand(-250, canvas.height + 120),
      size: rand(16, 36),
      sway: rand(0, Math.PI * 2),
      type: Math.random() < 0.55 ? 'round' : 'pine',
    };
  }

  function drawTree(tree, scrollSpeed) {
    const x = scaleX(tree.x), y = tree.y, s = scaleV(tree.size);
    const sway = Math.sin(frameCount * 0.018 + tree.sway) * s * 0.06;

    // Trunk
    ctx.fillStyle = '#6B4226';
    const trunkW = s * 0.18, trunkH = s * 0.7;
    ctx.fillRect(x - trunkW / 2 + sway * 0.3, y - trunkH * 0.2, trunkW, trunkH);
    // Trunk highlight
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x - trunkW / 2 + sway * 0.3, y - trunkH * 0.2, trunkW * 0.35, trunkH);

    if (tree.type === 'pine') {
      // Pine tree — triangular layers
      const layerH = s * 0.42;
      for (let i = 0; i < 3; i++) {
        const lw = s * (1.1 - i * 0.28);
        const ly = y - s * 0.25 - i * layerH * 0.55;
        const shade = 0.22 + i * 0.08;
        ctx.fillStyle = `rgb(${Math.floor(30 * shade + 25)},${Math.floor(80 * shade + 50)},${Math.floor(35 * shade + 20)})`;
        ctx.beginPath();
        ctx.moveTo(x + sway, ly - layerH);
        ctx.lineTo(x - lw / 2 + sway * 0.5, ly);
        ctx.lineTo(x + lw / 2 + sway * 0.5, ly);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      // Round canopy tree
      const cx = x + sway, cy = y - s * 0.1;
      ctx.fillStyle = '#3D7028';
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.48, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#4A8632';
      ctx.beginPath();
      ctx.arc(cx + s * 0.08, cy - s * 0.08, s * 0.38, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5A9E3C';
      ctx.beginPath();
      ctx.arc(cx - s * 0.04, cy - s * 0.14, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ═══════════════════════════════════════
  // DRAWING — SAFARI JEEP (top-down with perspective)
  // ═══════════════════════════════════════
  function drawJeep(x, y, w, h, tilt, squash) {
    ctx.save();
    ctx.translate(x, y);
    if (tilt) ctx.rotate(tilt);
    if (squash && squash !== 1) ctx.scale(squash, 2 - squash);

    const bw = w, bh = h;

    // ── Shadow ──
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, bh * 0.06, bw * 0.48, bh * 0.09, 0, 0, Math.PI * 2);
    ctx.fill();

    // ── Rear spare tire ──
    const spareY = -bh * 0.08;
    ctx.fillStyle = C.wheel;
    ctx.beginPath();
    ctx.arc(0, spareY, bw * 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = C.wheelHub;
    ctx.beginPath();
    ctx.arc(0, spareY, bw * 0.04, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = C.jeepBump;
    ctx.lineWidth = bw * 0.04;
    ctx.beginPath();
    ctx.moveTo(-bw * 0.06, spareY - bw * 0.12);
    ctx.lineTo(0, -bh * 0.25);
    ctx.lineTo(bw * 0.06, spareY - bw * 0.12);
    ctx.stroke();

    // ── Wheels ──
    const wheelW = bw * 0.19, wheelH = bh * 0.24;
    const wheelY = bh * 0.08;
    [-bw * 0.33, bw * 0.33].forEach(wx => {
      ctx.fillStyle = C.wheelTread;
      roundRect(wx - wheelW / 2, wheelY, wheelW, wheelH, wheelW * 0.22);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      for (let ty = wheelY + 2; ty < wheelY + wheelH - 2; ty += 3) {
        ctx.beginPath();
        ctx.moveTo(wx - wheelW / 2 + 2, ty);
        ctx.lineTo(wx + wheelW / 2 - 2, ty);
        ctx.stroke();
      }
      ctx.fillStyle = C.wheelHub;
      ctx.beginPath();
      ctx.arc(wx, wheelY + wheelH / 2, wheelW * 0.28, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.arc(wx, wheelY + wheelH / 2, wheelW * 0.12, 0, Math.PI * 2);
      ctx.fill();
    });

    // ── Main body — vibrant red-orange ──
    ctx.fillStyle = '#D93A2B';
    roundRect(-bw * 0.45, -bh * 0.18, bw * 0.9, bh * 0.58, bw * 0.09);
    ctx.fill();
    // Body highlight (top edge) — brighter
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    roundRect(-bw * 0.42, -bh * 0.16, bw * 0.84, bh * 0.15, bw * 0.06);
    ctx.fill();

    // ── Racing stripe down the center ──
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(-bw * 0.04, -bh * 0.18, bw * 0.08, bh * 0.28);
    ctx.fillRect(-bw * 0.02, -bh * 0.18, bw * 0.04, bh * 0.32);

    // ── Lower body trim / rocker panel (dark) ──
    ctx.fillStyle = '#2A2A2A';
    ctx.fillRect(-bw * 0.45, bh * 0.1, bw * 0.9, bh * 0.12);

    // ── Fender flares (black) ──
    [-bw * 0.33, bw * 0.33].forEach(fx => {
      ctx.fillStyle = '#2A2A2A';
      ctx.beginPath();
      ctx.arc(fx, bh * 0.03, bw * 0.16, Math.PI, 0);
      ctx.fill();
    });

    // ── Cabin — white/cream for contrast ──
    ctx.fillStyle = '#F5F0E0';
    roundRect(-bw * 0.2, -bh * 0.42, bw * 0.4, bh * 0.44, bw * 0.06);
    ctx.fill();
    // Cabin shadow at base
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    roundRect(-bw * 0.18, -bh * 0.06, bw * 0.36, bh * 0.08, bw * 0.03);
    ctx.fill();

    // ── Windshield ──
    ctx.fillStyle = '#B8E0F8';
    roundRect(-bw * 0.16, -bh * 0.38, bw * 0.32, bh * 0.16, bw * 0.04);
    ctx.fill();
    // Glass reflection — brighter
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.moveTo(-bw * 0.12, -bh * 0.38);
    ctx.lineTo(-bw * 0.04, -bh * 0.26);
    ctx.lineTo(bw * 0.1, -bh * 0.26);
    ctx.lineTo(bw * 0.1, -bh * 0.38);
    ctx.fill();

    // ── Roll cage bars (white metal) ──
    ctx.strokeStyle = '#CCC';
    ctx.lineWidth = bw * 0.04;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-bw * 0.18, -bh * 0.1);
    ctx.quadraticCurveTo(-bw * 0.18, -bh * 0.55, 0, -bh * 0.58);
    ctx.quadraticCurveTo(bw * 0.18, -bh * 0.55, bw * 0.18, -bh * 0.1);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-bw * 0.16, -bh * 0.3);
    ctx.lineTo(bw * 0.16, -bh * 0.3);
    ctx.stroke();

    // ── Snorkel ──
    ctx.strokeStyle = '#777';
    ctx.lineWidth = bw * 0.035;
    ctx.beginPath();
    ctx.moveTo(bw * 0.38, -bh * 0.1);
    ctx.lineTo(bw * 0.38, -bh * 0.48);
    ctx.stroke();
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(bw * 0.38, -bh * 0.5, bw * 0.04, 0, Math.PI * 2);
    ctx.fill();

    // ── Roof rack ──
    ctx.fillStyle = '#999';
    ctx.fillRect(-bw * 0.22, -bh * 0.55, bw * 0.44, bw * 0.04);
    ctx.fillRect(-bw * 0.22, -bh * 0.48, bw * 0.04, bw * 0.08);
    ctx.fillRect(bw * 0.18, -bh * 0.48, bw * 0.04, bw * 0.08);

    // ── Front bumper ──
    ctx.fillStyle = '#3A3A3A';
    roundRect(-bw * 0.43, -bh * 0.24, bw * 0.86, bh * 0.1, bw * 0.05);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(-bw * 0.4, -bh * 0.23, bw * 0.8, bh * 0.04, bw * 0.03);
    ctx.fill();

    // ── Headlights — brighter ──
    [-bw * 0.38, bw * 0.38].forEach(hx => {
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(hx, -bh * 0.12, bw * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFFDE0';
      ctx.beginPath();
      ctx.arc(hx, -bh * 0.12, bw * 0.055, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,253,224,0.6)';
      ctx.beginPath();
      ctx.arc(hx, -bh * 0.12, bw * 0.12, 0, Math.PI * 2);
      ctx.fill();
    });

    // ── Taillights ──
    [-bw * 0.32, bw * 0.32].forEach(tx => {
      ctx.fillStyle = '#FF2200';
      ctx.beginPath();
      ctx.arc(tx, bh * 0.22, bw * 0.04, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,34,0,0.3)';
      ctx.beginPath();
      ctx.arc(tx, bh * 0.22, bw * 0.07, 0, Math.PI * 2);
      ctx.fill();
    });

    // ── Fog lights (front bumper) ──
    [-bw * 0.28, bw * 0.28].forEach(fx => {
      ctx.fillStyle = '#FFFDE0';
      ctx.beginPath();
      ctx.arc(fx, -bh * 0.18, bw * 0.03, 0, Math.PI * 2);
      ctx.fill();
    });

    // ── Side mirrors ──
    [-bw * 0.22, bw * 0.22].forEach(mx => {
      ctx.fillStyle = '#444';
      ctx.fillRect(mx - bw * 0.02, -bh * 0.34, bw * 0.08, bw * 0.04);
      ctx.fillStyle = '#C8E8F8';
      ctx.fillRect(mx + bw * 0.02, -bh * 0.33, bw * 0.03, bw * 0.03);
    });

    ctx.restore();
  }

  // ═══════════════════════════════════════
  // DRAWING — OBSTACLES (improved)
  // ═══════════════════════════════════════
  function drawBear(x, y, s) {
    ctx.save();
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.4, s * 0.4, s * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ears — round, at top
    ctx.fillStyle = '#4A2216';
    [[-0.16, -0.28], [0.16, -0.28]].forEach(([ex, ey]) => {
      ctx.beginPath();
      ctx.arc(x + ex * s, y + ey * s, s * 0.14, 0, Math.PI * 2);
      ctx.fill();
      // Inner ear
      ctx.fillStyle = '#8B6040';
      ctx.beginPath();
      ctx.arc(x + ex * s, y + ey * s, s * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#4A2216';
    });

    // Face — large round
    const faceGrad = ctx.createRadialGradient(x, y - s * 0.02, s * 0.05, x, y, s * 0.42);
    faceGrad.addColorStop(0, '#6B3A2A');
    faceGrad.addColorStop(0.7, '#4A2216');
    faceGrad.addColorStop(1, '#2E120A');
    ctx.fillStyle = faceGrad;
    ctx.beginPath();
    ctx.arc(x, y, s * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Muzzle — lighter brown circle
    ctx.fillStyle = '#A07050';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.12, s * 0.18, s * 0.14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nose — dark
    ctx.fillStyle = '#1A0A04';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.04, s * 0.07, s * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes — white with dark pupil
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(x - s * 0.1, y - s * 0.08, s * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.1, y - s * 0.08, s * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(x - s * 0.1, y - s * 0.08, s * 0.03, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.1, y - s * 0.08, s * 0.03, 0, Math.PI * 2);
    ctx.fill();

    // Mouth — slight frown
    ctx.strokeStyle = '#1A0A04';
    ctx.lineWidth = s * 0.025;
    ctx.beginPath();
    ctx.arc(x, y + s * 0.16, s * 0.06, 0.1, Math.PI - 0.1);
    ctx.stroke();

    ctx.restore();
  }

  function drawSheep(x, y, s) {
    ctx.save();
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.36, s * 0.34, s * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ears — black, floppy, sticking out sideways
    ctx.fillStyle = '#2A2A2A';
    [[-0.24, -0.1], [0.24, -0.1]].forEach(([ex, ey]) => {
      ctx.beginPath();
      ctx.ellipse(x + ex * s, y + ey * s, s * 0.14, s * 0.08, -0.3 * Math.sign(ex), 0, Math.PI * 2);
      ctx.fill();
      // Inner ear pink
      ctx.fillStyle = '#E8A0A0';
      ctx.beginPath();
      ctx.ellipse(x + ex * s, y + ey * s, s * 0.08, s * 0.04, -0.3 * Math.sign(ex), 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2A2A2A';
    });

    // Wool — fluffy cloud-like face
    const woolGrad = ctx.createRadialGradient(x, y - s * 0.04, s * 0.05, x, y, s * 0.38);
    woolGrad.addColorStop(0, '#FAFAFA');
    woolGrad.addColorStop(0.5, '#F0EDE8');
    woolGrad.addColorStop(1, '#D8D2C8');
    ctx.fillStyle = woolGrad;

    // Bumpy wool outline
    ctx.beginPath();
    const bumps = 18;
    for (let i = 0; i < bumps; i++) {
      const a = (i / bumps) * Math.PI * 2 - Math.PI / 2;
      const r = s * (0.34 + Math.sin(i * 3.5) * 0.08 + Math.sin(i * 5.7) * 0.05);
      const px = x + Math.cos(a) * r;
      const py = y + Math.sin(a) * r * 0.9;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();

    // Face — darker skin visible on front
    ctx.fillStyle = '#3A3028';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.05, s * 0.14, s * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nose — black, prominent
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.02, s * 0.06, s * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes — gentle, slightly sleepy
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(x - s * 0.08, y - s * 0.06, s * 0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.08, y - s * 0.06, s * 0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(x - s * 0.08, y - s * 0.06, s * 0.028, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.08, y - s * 0.06, s * 0.028, 0, Math.PI * 2);
    ctx.fill();

    // Wool tufts on cheeks
    ctx.fillStyle = '#F5F2EE';
    [[-0.26, 0.12], [0.26, 0.12]].forEach(([wx, wy]) => {
      ctx.beginPath();
      ctx.arc(x + wx * s, y + wy * s, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.restore();
  }

  function drawDeer(x, y, s) {
    ctx.save();
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.38, s * 0.36, s * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();

    // Antlers — prominent, branching upward
    ctx.strokeStyle = '#5C3D1E';
    ctx.lineWidth = s * 0.05;
    ctx.lineCap = 'round';
    // Left antler
    ctx.beginPath();
    ctx.moveTo(x - s * 0.08, y - s * 0.24);
    ctx.lineTo(x - s * 0.18, y - s * 0.48);
    ctx.lineTo(x - s * 0.28, y - s * 0.55);
    ctx.moveTo(x - s * 0.18, y - s * 0.48);
    ctx.lineTo(x - s * 0.04, y - s * 0.52);
    ctx.stroke();
    // Right antler
    ctx.beginPath();
    ctx.moveTo(x + s * 0.08, y - s * 0.24);
    ctx.lineTo(x + s * 0.18, y - s * 0.48);
    ctx.lineTo(x + s * 0.28, y - s * 0.55);
    ctx.moveTo(x + s * 0.18, y - s * 0.48);
    ctx.lineTo(x + s * 0.04, y - s * 0.52);
    ctx.stroke();

    // Ears — oval, sticking out
    ctx.fillStyle = C.deerBody;
    [[-0.22, -0.22], [0.22, -0.22]].forEach(([ex, ey]) => {
      ctx.beginPath();
      ctx.ellipse(x + ex * s, y + ey * s, s * 0.08, s * 0.14, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Face — oval, warm brown
    const faceGrad = ctx.createRadialGradient(x, y - s * 0.04, s * 0.04, x, y, s * 0.34);
    faceGrad.addColorStop(0, '#D4A86C');
    faceGrad.addColorStop(0.7, '#C4956A');
    faceGrad.addColorStop(1, '#A0754A');
    ctx.fillStyle = faceGrad;
    ctx.beginPath();
    ctx.ellipse(x, y, s * 0.32, s * 0.36, 0, 0, Math.PI * 2);
    ctx.fill();

    // Lighter muzzle/cheek area
    ctx.fillStyle = '#F0E0CC';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.1, s * 0.16, s * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nose — dark
    ctx.fillStyle = '#1A1A1A';
    ctx.beginPath();
    ctx.arc(x, y - s * 0.02, s * 0.05, 0, Math.PI * 2);
    ctx.fill();

    // Eyes — large, gentle
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(x - s * 0.09, y - s * 0.08, s * 0.065, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.09, y - s * 0.08, s * 0.065, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(x - s * 0.09, y - s * 0.08, s * 0.032, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.09, y - s * 0.08, s * 0.032, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // ═══════════════════════════════════════
  // DRAWING — COLLECTIBLES
  // ═══════════════════════════════════════
  function drawFruit(x, y, r) {
    const pulse = 1 + Math.sin(frameCount * 0.08) * 0.12;
    const glowPulse = 0.55 + Math.sin(frameCount * 0.1 + 1) * 0.35;
    const sparklePhase = frameCount * 0.12;
    const r2 = r * pulse;

    // Outer pulsing glow rings
    for (let g = 3; g >= 0; g--) {
      const gr = r2 * (1.6 + g * 0.5);
      const ga = (0.08 + g * 0.04) * glowPulse;
      ctx.globalAlpha = ga;
      ctx.fillStyle = g % 2 === 0 ? '#FF4500' : '#FFD700';
      ctx.beginPath();
      ctx.arc(x, y, gr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.arc(x + r2 * 0.12, y + r2 * 0.2, r2 * 0.8, 0, Math.PI * 2);
    ctx.fill();

    // Main body — bright fiery orange-red
    const grad = ctx.createRadialGradient(x - r2 * 0.25, y - r2 * 0.3, r2 * 0.05, x, y, r2);
    grad.addColorStop(0, '#FFE066');
    grad.addColorStop(0.3, '#FF9500');
    grad.addColorStop(0.7, '#FF5E00');
    grad.addColorStop(1, '#CC2200');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r2, 0, Math.PI * 2);
    ctx.fill();

    // White highlight (shinier)
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.arc(x - r2 * 0.25, y - r2 * 0.3, r2 * 0.28, 0, Math.PI * 2);
    ctx.fill();

    // Second small highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(x - r2 * 0.12, y - r2 * 0.45, r2 * 0.12, 0, Math.PI * 2);
    ctx.fill();

    // Leaf — larger and more vivid
    ctx.fillStyle = '#3DBF3E';
    ctx.beginPath();
    ctx.ellipse(x + r2 * 0.32, y - r2 * 0.85, r2 * 0.6, r2 * 0.28, 0.35, 0, Math.PI * 2);
    ctx.fill();
    // Leaf vein
    ctx.strokeStyle = '#2D8F2E';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(x + r2 * 0.32, y - r2 * 0.85);
    ctx.lineTo(x + r2 * 0.55, y - r2 * 0.72);
    ctx.stroke();
    // Leaf highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(x + r2 * 0.28, y - r2 * 0.88, r2 * 0.3, r2 * 0.1, 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Stem
    ctx.strokeStyle = '#2D7A2E';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + r2 * 0.05, y - r2 * 0.78);
    ctx.lineTo(x + r2 * 0.25, y - r2 * 0.62);
    ctx.stroke();

    // Sparkle rays rotating around the fruit
    for (let i = 0; i < 8; i++) {
      const angle = sparklePhase + i * Math.PI / 4;
      const sparkDist = r2 * (1.5 + Math.sin(sparklePhase * 0.7 + i * 1.3) * 0.25);
      const sparkSize = 1.5 + Math.sin(sparklePhase + i * 2) * 1.2;
      const sparkAlpha = 0.3 + Math.sin(sparklePhase * 1.1 + i * 1.7) * 0.25;
      ctx.globalAlpha = Math.max(0, sparkAlpha);
      const sx = x + Math.cos(angle) * sparkDist;
      const sy = y + Math.sin(angle) * sparkDist;
      ctx.fillStyle = '#FFE066';
      ctx.beginPath();
      ctx.moveTo(sx, sy - sparkSize);
      ctx.lineTo(sx + sparkSize * 0.4, sy - sparkSize * 0.2);
      ctx.lineTo(sx + sparkSize, sy);
      ctx.lineTo(sx + sparkSize * 0.4, sy + sparkSize * 0.2);
      ctx.lineTo(sx, sy + sparkSize);
      ctx.lineTo(sx - sparkSize * 0.4, sy + sparkSize * 0.2);
      ctx.lineTo(sx - sparkSize, sy);
      ctx.lineTo(sx - sparkSize * 0.4, sy - sparkSize * 0.2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawFuelCan(x, y, w, h) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + w * 0.06, y + h * 0.18, w / 2, h / 2.8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Outer glow ring
    const glowPulse = 0.35 + Math.sin(frameCount * 0.09) * 0.2;
    ctx.globalAlpha = glowPulse;
    ctx.fillStyle = '#8B0000';
    ctx.beginPath();
    ctx.arc(x, y + h * 0.02, Math.max(w, h) * 0.9, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Body — bold red with horizontal gradient
    const grad = ctx.createLinearGradient(x - w / 2, y, x + w / 2, y);
    grad.addColorStop(0, '#B22222');
    grad.addColorStop(0.3, '#E83535');
    grad.addColorStop(0.7, '#DC2626');
    grad.addColorStop(1, '#991111');
    ctx.fillStyle = grad;
    roundRect(x - w / 2, y - h / 2, w, h, w * 0.18);
    ctx.fill();

    // Yellow accent stripe (horizontal band across the middle)
    ctx.fillStyle = '#FFD700';
    roundRect(x - w * 0.42, y - h * 0.15, w * 0.84, h * 0.18, 2);
    ctx.fill();
    // Yellow stripe glow
    ctx.fillStyle = 'rgba(255,215,0,0.2)';
    roundRect(x - w * 0.44, y - h * 0.17, w * 0.88, h * 0.22, 3);
    ctx.fill();

    // Ridges (darker red)
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    for (let i = 1; i <= 3; i++) {
      const ry = y - h / 2 + (h / 4) * i;
      ctx.beginPath();
      ctx.moveTo(x - w / 2 + 5, ry);
      ctx.lineTo(x + w / 2 - 5, ry);
      ctx.stroke();
    }

    // Cap
    ctx.fillStyle = '#222';
    roundRect(x - w * 0.14, y - h / 2 - h * 0.14, w * 0.28, h * 0.16, 3);
    ctx.fill();
    ctx.fillStyle = '#555';
    roundRect(x - w * 0.08, y - h / 2 - h * 0.1, w * 0.16, h * 0.06, 2);
    ctx.fill();

    // White reflection/shine on left side
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    roundRect(x - w * 0.42, y - h * 0.4, w * 0.12, h * 0.5, 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    roundRect(x - w * 0.42, y + h * 0.15, w * 0.12, h * 0.22, 2);
    ctx.fill();

    // Fuel symbol on can (drawn fuel droplet)
    drawFuelIcon(x, y + h * 0.02, w * 0.22, '#FFF');
  }

  // ═══════════════════════════════════════
  // PARTICLES
  // ═══════════════════════════════════════
  function spawnDust(x, y, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x + rand(-16, 16),
        y: y + rand(-4, 12),
        vx: rand(-0.5, 0.5),
        vy: rand(0.4, 1.5),
        life: rand(0.3, 0.7),
        maxLife: 0.7,
        size: rand(2, 5),
        type: 'dust',
      });
    }
  }

  function spawnCollectFX(x, y, color) {
    for (let i = 0; i < 10; i++) {
      const angle = rand(0, Math.PI * 2);
      const spd = rand(2.5, 6);
      particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 0.45,
        maxLife: 0.45,
        size: rand(2.5, 5),
        type: 'spark',
        color: color,
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      p.x += p.vx;
      p.y += p.vy;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      const alpha = clamp(p.life / p.maxLife, 0, 1);
      ctx.globalAlpha = alpha;
      if (p.type === 'dust') {
        ctx.fillStyle = `rgba(180,150,110,0.7)`;
        ctx.beginPath();
        ctx.arc(scaleX(p.x), p.y, scaleV(p.size), 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(scaleX(p.x), p.y, scaleV(p.size), 0, Math.PI * 2);
        ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
  }

  // ═══════════════════════════════════════
  // GAME OBJECT SPAWNING
  // ═══════════════════════════════════════
  const OBSTACLE_TYPES = ['deer', 'bear', 'sheep'];

  // Returns set of lanes occupied near the spawn zone (top of screen)
  function getBusyLanes() {
    const busy = new Set();
    const zone = canvas.height * 0.25;
    for (const o of obstacles) {
      if (o.y < zone) o.lanes.forEach(l => busy.add(l));
    }
    for (const c of collectibles) {
      if (c.y < zone) busy.add(c.lane);
    }
    return busy;
  }

  function pickFreeLane() {
    const busy = getBusyLanes();
    const free = [];
    for (let i = 0; i < LANES; i++) {
      if (!busy.has(i)) free.push(i);
    }
    if (free.length > 0) return free[randInt(0, free.length - 1)];
    // All lanes busy — pick the one with fewest items near spawn
    const counts = Array(LANES).fill(0);
    const zone = canvas.height * 0.25;
    for (const o of obstacles) {
      if (o.y < zone) o.lanes.forEach(l => counts[l]++);
    }
    for (const c of collectibles) {
      if (c.y < zone) counts[c.lane]++;
    }
    let best = 0;
    for (let i = 1; i < LANES; i++) {
      if (counts[i] < counts[best]) best = i;
    }
    return best;
  }

  function spawnObstacle() {
    const type = OBSTACLE_TYPES[randInt(0, 2)];
    const lane = pickFreeLane();
    const x = LANE_CX[lane];
    let w = 0, h = 0, r = 0;

    switch (type) {
      case 'deer':
        w = rand(35, 50);
        r = w * 0.35;
        break;
      case 'bear':
        w = rand(44, 60);
        r = w * 0.38;
        break;
      case 'sheep':
        w = rand(38, 52);
        r = w * 0.36;
        break;
    }

    obstacles.push({ type, x, y: -50, w, h, r, lanes: [lane] });
  }

  function spawnCollectible() {
    const lane = pickFreeLane();
    collectibles.push({
      x: LANE_CX[lane],
      y: -30,
      lane: lane,
      type: Math.random() < 0.10 ? 'fuel' : 'fruit',
    });
  }

  // ═══════════════════════════════════════
  // COLLISION
  // ═══════════════════════════════════════
  function checkCollision(ox, oy, ow, oh, or, lanes, pLane, px, py, pw, ph) {
    if (!lanes.includes(pLane)) return false;
    if (or) {
      const cx = ox, cy = oy;
      const closestX = clamp(cx, px - pw / 2, px + pw / 2);
      const closestY = clamp(cy, py - ph / 2, py + ph / 2);
      return (cx - closestX) ** 2 + (cy - closestY) ** 2 < or * or;
    }
    const margin = pw * 0.32;
    return (
      px + pw / 2 - margin > ox - ow / 2 &&
      px - pw / 2 + margin < ox + ow / 2 &&
      py + ph / 2 - margin * 0.5 > oy - oh / 2 &&
      py - ph / 2 + margin * 0.5 < oy + oh / 2
    );
  }

  // ═══════════════════════════════════════
  // DRAWN ICONS — consistent cross-platform replacements for emoji
  // ═══════════════════════════════════════
  function drawFruitIcon(x, y, s) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.arc(x + s*0.08, y + s*0.1, s*0.42, 0, Math.PI*2); ctx.fill();
    const g = ctx.createRadialGradient(x - s*0.1, y - s*0.1, s*0.03, x, y, s*0.45);
    g.addColorStop(0, '#FFE066'); g.addColorStop(0.4, '#FF9500');
    g.addColorStop(0.8, '#FF5E00'); g.addColorStop(1, '#CC2200');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, s*0.4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(x - s*0.1, y - s*0.12, s*0.13, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#43A047';
    ctx.beginPath(); ctx.ellipse(x + s*0.18, y - s*0.32, s*0.22, s*0.1, 0.4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#2E7D32'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x + s*0.02, y - s*0.28); ctx.lineTo(x + s*0.12, y - s*0.2); ctx.stroke();
  }

  function drawFuelIcon(x, y, s, color) {
    const c = color || '#D32F2F';
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(x, y - s*0.35);
    ctx.quadraticCurveTo(x + s*0.32, y + s*0.05, x + s*0.18, y + s*0.32);
    ctx.quadraticCurveTo(x, y + s*0.42, x - s*0.18, y + s*0.32);
    ctx.quadraticCurveTo(x - s*0.32, y + s*0.05, x, y - s*0.35);
    ctx.fill();
    if (c !== '#FFF' && c !== '#FFFFFF') {
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.ellipse(x - s*0.06, y, s*0.08, s*0.15, -0.3, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawSpeakerIcon(x, y, s, isMuted) {
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.moveTo(x - s*0.2, y - s*0.15); ctx.lineTo(x - s*0.05, y - s*0.15);
    ctx.lineTo(x + s*0.15, y - s*0.35); ctx.lineTo(x + s*0.15, y + s*0.35);
    ctx.lineTo(x - s*0.05, y + s*0.15); ctx.lineTo(x - s*0.2, y + s*0.15);
    ctx.closePath(); ctx.fill();
    if (!isMuted) {
      ctx.strokeStyle = '#FFF'; ctx.lineWidth = s*0.06; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(x + s*0.22, y, s*0.2, -0.5, 0.5); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + s*0.3, y, s*0.35, -0.5, 0.5); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + s*0.38, y, s*0.5, -0.45, 0.45); ctx.stroke();
    } else {
      ctx.strokeStyle = '#FFF'; ctx.lineWidth = s*0.08; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x + s*0.28, y - s*0.22); ctx.lineTo(x + s*0.48, y + s*0.22); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + s*0.48, y - s*0.22); ctx.lineTo(x + s*0.28, y + s*0.22); ctx.stroke();
    }
  }

  function drawStarIcon(x, y, s) {
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
      const r = i % 2 === 0 ? s*0.5 : s*0.18;
      if (i === 0) ctx.moveTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
      else ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(x, y, s*0.08, 0, Math.PI*2); ctx.fill();
  }

  function drawPlayTriangle(x, y, s) {
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.moveTo(x - s*0.35, y - s*0.42);
    ctx.lineTo(x + s*0.4, y);
    ctx.lineTo(x - s*0.35, y + s*0.42);
    ctx.closePath(); ctx.fill();
  }

  // ═══════════════════════════════════════
  // HUD
  // ═══════════════════════════════════════
  function drawHUD() {
    const pad = scaleV(10);
    const fs = scaleV(14);

    // Top bar — taller to fit two clean rows
    ctx.fillStyle = C.hudBg;
    roundRect(scaleX(3), 3, scaleX(GAME_W - 6), scaleV(48), scaleV(10));
    ctx.fill();

    // ─── ROW 1: Score (left) · Distance (center) ───
    ctx.fillStyle = C.hudText;
    ctx.font = `bold ${fs}px 'Fredoka', system-ui, sans-serif`;
    ctx.textBaseline = 'middle';

    ctx.textAlign = 'left';
    drawFruitIcon(pad + scaleV(6), scaleV(18) - scaleV(5), scaleV(10));
    ctx.fillText(`${score}`, pad + scaleV(16), scaleV(18));

    ctx.textAlign = 'center';
    ctx.fillText(`${Math.floor(distance)}m`, scaleX(GAME_W / 2), scaleV(18));

    // ─── ROW 2: Fuel gauge (left) · Speed (right) ───
    const fuelW = scaleV(80), fuelH = scaleV(10);
    const fuelY = scaleV(34);
    const fuelIconX = pad + scaleV(2);
    const fuelX = fuelIconX + scaleV(18);

    // Fuel icon (drawn droplet)
    drawFuelIcon(fuelIconX + scaleV(4), fuelY + fuelH / 2, scaleV(7));

    // Fuel bar background
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    roundRect(fuelX - 1, fuelY - 1, fuelW + 2, fuelH + 2, fuelH / 2 + 1);
    ctx.fill();

    // Fuel bar fill
    const pct = clamp(fuel / FUEL_MAX, 0, 1);
    let fuelColor;
    if (pct > 0.4) fuelColor = C.safe;
    else if (pct > 0.2) fuelColor = C.warning;
    else fuelColor = C.danger;

    const fg = ctx.createLinearGradient(fuelX, 0, fuelX + fuelW, 0);
    fg.addColorStop(0, fuelColor);
    fg.addColorStop(1, pct > 0.4 ? '#66BB6A' : pct > 0.2 ? '#F5B041' : '#F06050');
    ctx.fillStyle = fg;
    roundRect(fuelX, fuelY, fuelW * pct, fuelH, fuelH / 2);
    ctx.fill();

    // Fuel bar shine
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(fuelX, fuelY, fuelW * pct, fuelH / 2, fuelH / 2);
    ctx.fill();

    // Speed badge
    const speedKph = Math.round(speed / 180 * 60);
    ctx.fillStyle = C.hudText;
    ctx.font = `600 ${fs * 0.7}px 'Fredoka', system-ui, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(`${speedKph} km/h`, scaleX(GAME_W - GRASS_W - 6), scaleV(39));
  }

  // ═══════════════════════════════════════
  // SCREENS
  // ═══════════════════════════════════════
  function drawTitleScreen() {
    const cx = canvas.width / 2;
    const cy = canvas.height * 0.32;

    // ── Background overlay — deep forest gradient ──
    const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGrad.addColorStop(0, 'rgba(15,30,15,0.82)');
    bgGrad.addColorStop(0.5, 'rgba(20,40,20,0.78)');
    bgGrad.addColorStop(1, 'rgba(10,20,10,0.88)');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ── Decorative tree silhouettes on sides ──
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    for (let i = 0; i < 5; i++) {
      const tx = scaleV(15 + i * 22);
      const th = scaleV(50 + Math.sin(i * 1.7) * 30);
      ctx.beginPath();
      ctx.moveTo(tx, canvas.height * 0.55);
      ctx.lineTo(tx - scaleV(18), canvas.height * 0.55 - th);
      ctx.lineTo(tx + scaleV(18), canvas.height * 0.55 - th);
      ctx.closePath();
      ctx.fill();
      // Right side
      const rx = canvas.width - tx;
      ctx.beginPath();
      ctx.moveTo(rx, canvas.height * 0.55);
      ctx.lineTo(rx - scaleV(18), canvas.height * 0.55 - th);
      ctx.lineTo(rx + scaleV(18), canvas.height * 0.55 - th);
      ctx.closePath();
      ctx.fill();
    }

    // ── Floating particles (animated) ──
    for (let i = 0; i < 12; i++) {
      const px = (Math.sin(frameCount * 0.015 + i * 1.7) * 0.4 + 0.5) * canvas.width;
      const py = (Math.cos(frameCount * 0.02 + i * 2.1) * 0.3 + 0.5) * canvas.height * 0.7;
      const alpha = 0.15 + Math.sin(frameCount * 0.03 + i) * 0.08;
      ctx.fillStyle = `rgba(255,220,150,${alpha})`;
      ctx.beginPath();
      ctx.arc(px, py, scaleV(2), 0, Math.PI * 2);
      ctx.fill();
    }

    // ── Title — big, bold, gradient with decorative lines ──
    const titleY = cy - scaleV(50);
    // Decorative line left
    const lineW = scaleX(50);
    const lineGap = scaleV(14);
    ctx.strokeStyle = '#FFD54F';
    ctx.lineWidth = scaleV(2.5);
    ctx.beginPath();
    ctx.moveTo(cx - scaleX(120), titleY);
    ctx.lineTo(cx - lineW - lineGap, titleY);
    ctx.stroke();
    // Diamond dot left
    ctx.fillStyle = '#FFD54F';
    ctx.beginPath();
    ctx.moveTo(cx - lineW - lineGap, titleY);
    ctx.lineTo(cx - lineW - lineGap - scaleV(5), titleY - scaleV(4));
    ctx.lineTo(cx - lineW - lineGap, titleY - scaleV(8));
    ctx.lineTo(cx - lineW - lineGap + scaleV(5), titleY - scaleV(4));
    ctx.closePath();
    ctx.fill();

    // Decorative line right
    ctx.strokeStyle = '#FFD54F';
    ctx.beginPath();
    ctx.moveTo(cx + scaleX(120), titleY);
    ctx.lineTo(cx + lineW + lineGap, titleY);
    ctx.stroke();
    // Diamond dot right
    ctx.fillStyle = '#FFD54F';
    ctx.beginPath();
    ctx.moveTo(cx + lineW + lineGap, titleY);
    ctx.lineTo(cx + lineW + lineGap - scaleV(5), titleY - scaleV(4));
    ctx.lineTo(cx + lineW + lineGap, titleY - scaleV(8));
    ctx.lineTo(cx + lineW + lineGap + scaleV(5), titleY - scaleV(4));
    ctx.closePath();
    ctx.fill();

    // Title text with gradient
    const titleGrad = ctx.createLinearGradient(cx, titleY - scaleV(20), cx, titleY + scaleV(20));
    titleGrad.addColorStop(0, '#FFE082');
    titleGrad.addColorStop(0.4, '#FFD54F');
    titleGrad.addColorStop(0.7, '#FFB300');
    titleGrad.addColorStop(1, '#FF8F00');
    ctx.fillStyle = titleGrad;
    ctx.font = `900 ${scaleV(44)}px 'Fredoka One', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('WILD RUN', cx, titleY);

    // Title shadow/outline for depth
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = scaleV(3);
    ctx.strokeText('WILD RUN', cx, titleY);

    // ── Subtitle ──
    const subY = titleY + scaleV(36);
    ctx.fillStyle = '#C8E6A0';
    ctx.font = `600 ${scaleV(14)}px 'Fredoka', system-ui, sans-serif`;
    ctx.fillText('Race through the wilderness', cx, subY);

    // ── Control cards ──
    const cardY = subY + scaleV(28);
    const cardW = scaleX(130);
    const cardH = scaleV(90);
    const cardGap = scaleV(8);
    const leftCardX = cx - cardW - cardGap / 2;
    const rightCardX = cx + cardGap / 2;

    // Card backgrounds with colored top accent
    [leftCardX, rightCardX].forEach((cardX, ci) => {
      const cardGrad = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
      cardGrad.addColorStop(0, 'rgba(255,255,255,0.14)');
      cardGrad.addColorStop(1, 'rgba(255,255,255,0.05)');
      ctx.fillStyle = cardGrad;
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = scaleV(2);
      roundRect(cardX, cardY, cardW, cardH, scaleV(12));
      ctx.fill();
      ctx.stroke();
      // Top accent bar
      ctx.fillStyle = ci === 0 ? '#FF9800' : '#4CAF50';
      roundRect(cardX + scaleV(2), cardY + scaleV(2), cardW - scaleV(4), scaleV(4), scaleV(2));
      ctx.fill();
    });

    // Left card: Controls
    ctx.fillStyle = '#FFF';
    ctx.font = `900 ${scaleV(13)}px 'Fredoka One', system-ui, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('CONTROLS', leftCardX + scaleV(12), cardY + scaleV(24));
    ctx.fillStyle = '#E0E0E0';
    ctx.font = `600 ${scaleV(11)}px 'Fredoka', system-ui, sans-serif`;
    const lh = scaleV(17);
    // Arrow key icons drawn
    const aRowY = cardY + scaleV(24) + lh;
    ctx.fillStyle = '#FFD54F';
    ctx.font = `bold ${scaleV(12)}px 'Fredoka', system-ui, sans-serif`;
    ctx.fillText('◀ ▶', leftCardX + scaleV(10), aRowY);
    ctx.fillStyle = '#E0E0E0';
    ctx.font = `600 ${scaleV(10.5)}px 'Fredoka', system-ui, sans-serif`;
    ctx.fillText('  Arrow keys to steer', leftCardX + scaleV(32), aRowY);
    // Nitro
    const nRowY = aRowY + lh;
    ctx.fillStyle = '#FFD54F';
    ctx.font = `bold ${scaleV(12)}px 'Fredoka', system-ui, sans-serif`;
    ctx.fillText('▲', leftCardX + scaleV(16), nRowY);
    ctx.fillStyle = '#E0E0E0';
    ctx.font = `600 ${scaleV(10.5)}px 'Fredoka', system-ui, sans-serif`;
    ctx.fillText('  Hold for nitro boost', leftCardX + scaleV(32), nRowY);

    // Right card: Collectibles
    ctx.fillStyle = '#FFF';
    ctx.font = `900 ${scaleV(13)}px 'Fredoka One', system-ui, sans-serif`;
    ctx.fillText('COLLECT', rightCardX + scaleV(12), cardY + scaleV(24));
    // Fruit
    const fRowY = cardY + scaleV(24) + lh;
    drawFruitIcon(rightCardX + scaleV(14), fRowY + scaleV(2), scaleV(6.5));
    ctx.fillStyle = '#E0E0E0';
    ctx.font = `600 ${scaleV(10.5)}px 'Fredoka', system-ui, sans-serif`;
    ctx.fillText('  Fruit = points', rightCardX + scaleV(24), fRowY + scaleV(1));
    // Fuel
    const fuRowY = fRowY + lh;
    drawFuelIcon(rightCardX + scaleV(14), fuRowY + scaleV(4), scaleV(9), '#F44336');
    ctx.fillText('  Fuel can = keep going', rightCardX + scaleV(24), fuRowY + scaleV(1));

    // ── Dodge tip line ──
    const tipY = cardY + cardH + scaleV(16);
    ctx.fillStyle = '#FFCC80';
    ctx.font = `600 ${scaleV(11)}px 'Fredoka One', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Dodge bears, deer & sheep!', cx, tipY);

    // ── START button — big, pulsing, game-like ──
    const btnW = scaleX(170);
    const btnH = scaleV(50);
    const btnX = cx - btnW / 2;
    const btnY = tipY + scaleV(24);
    const pulse = 1 + Math.sin(frameCount * 0.06) * 0.04;

    // Outer glow
    ctx.shadowColor = 'rgba(255,140,0,0.5)';
    ctx.shadowBlur = scaleV(18) * pulse;

    // Button gradient
    const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
    btnGrad.addColorStop(0, '#FF9800');
    btnGrad.addColorStop(0.5, '#FF6D00');
    btnGrad.addColorStop(1, '#E65100');
    ctx.fillStyle = btnGrad;
    roundRect(btnX, btnY, btnW, btnH, btnH / 2);
    ctx.fill();

    // Button top shine
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    roundRect(btnX + scaleV(4), btnY + scaleV(2), btnW - scaleV(8), btnH / 2, btnH / 3);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Button border
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = scaleV(2);
    roundRect(btnX, btnY, btnW, btnH, btnH / 2);
    ctx.stroke();

    // Button text
    ctx.fillStyle = '#FFF';
    ctx.font = `900 ${scaleV(20)}px 'Fredoka One', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    drawPlayTriangle(cx - scaleV(48), btnY + btnH / 2, scaleV(14));
    ctx.fillText('START', cx + scaleV(8), btnY + btnH / 2);

    // ── High score ──
    if (highScore > 0) {
      const hsY = btnY + btnH + scaleV(22);
      ctx.fillStyle = '#FFE082';
      ctx.font = `600 ${scaleV(11)}px 'Fredoka', system-ui, sans-serif`;
      drawStarIcon(cx - scaleX(54), hsY, scaleV(6));
      ctx.fillText(`Best: ${highScore} pts   •   ${highDist}m`, cx + scaleV(4), hsY);
    }

    // ── Footer line ──
    const footerY = canvas.height - scaleV(18);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = `600 ${scaleV(9)}px 'Fredoka', system-ui, sans-serif`;
    ctx.fillText('Tap screen or press SPACE to start', cx, footerY);

    // Store button bounds for click detection
    canvas._startBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  }

  function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height * 0.33;

    ctx.fillStyle = '#FF6B35';
    ctx.font = `900 ${scaleV(36)}px 'Fredoka One', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Game Over', cx, cy - scaleV(18));

    const statsY = cy + scaleV(28);
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${scaleV(20)}px 'Fredoka', system-ui, sans-serif`;
    drawFruitIcon(cx - scaleV(28), statsY - scaleV(1), scaleV(11));
    ctx.fillText(`${score}`, cx + scaleV(6), statsY);
    ctx.fillStyle = '#CCC';
    ctx.font = `600 ${scaleV(16)}px 'Fredoka', system-ui, sans-serif`;
    ctx.fillText(`${Math.floor(distance)}m`, cx, statsY + scaleV(32));

    let newBest = false;
    if (score > highScore) {
      newBest = true;
      highScore = score;
      safeLS('wildrun_hs', highScore);
    }
    if (distance > highDist) {
      highDist = Math.floor(distance);
      safeLS('wildrun_hd', highDist);
    }

    if (newBest) {
      ctx.fillStyle = '#FFD93D';
      ctx.font = `bold ${scaleV(17)}px 'Fredoka One', system-ui, sans-serif`;
      drawStarIcon(cx - scaleV(80), statsY + scaleV(65), scaleV(9));
      ctx.fillText('New High Score!', cx, statsY + scaleV(65));
      drawStarIcon(cx + scaleV(80), statsY + scaleV(65), scaleV(9));
    }

    const btnY = statsY + scaleV(95);
    const btnGrad = ctx.createLinearGradient(cx, btnY, cx, btnY + scaleV(44));
    btnGrad.addColorStop(0, '#5CB860');
    btnGrad.addColorStop(1, '#3D8B40');
    ctx.fillStyle = btnGrad;
    roundRect(cx - scaleX(82), btnY, scaleX(164), scaleV(44), scaleV(22));
    ctx.fill();

    ctx.fillStyle = '#FFF';
    ctx.font = `900 ${scaleV(17)}px 'Fredoka One', system-ui, sans-serif`;
    ctx.fillText('PLAY AGAIN', cx, btnY + scaleV(22));

    canvas._restartBtn = { x: cx - scaleX(82), y: btnY, w: scaleX(164), h: scaleV(44) };
  }

  function drawMuteButton() {
    const r = scaleV(18);
    const x = scaleX(GAME_W - GRASS_W - 4) - r;
    const y = scaleV(46);
    canvas._muteBtn = { x: x - r, y: y - r, w: r * 2, h: r * 2 };

    // Background circle
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    // Speaker icon (drawn)
    drawSpeakerIcon(x, y, r * 0.9, muted);
  }

  // ═══════════════════════════════════════
  // GAME LOGIC
  // ═══════════════════════════════════════
  function resetGame() {
    score = 0;
    distance = 0;
    speed = BASE_SPEED;
    fuel = FUEL_MAX;
    playerLane = 1;
    prevLane = 1;
    playerX = LANE_CX[1];
    displayX = LANE_CX[1];
    tiltAngle = 0;
    squashScale = 1;
    switchDustTimer = 0;
    obstacles = [];
    collectibles = [];
    particles = [];
    lastObstacleDist = 0;
    nitroActive = false;
    nitroFuel = 0;
    shakeTimer = 0;
    nearMissTimer = 0;
    laneSwitchCooldown = 0;
    stopEngine();
  }

  function update(dt) {
    if (state !== 'playing') return;
    const dtC = Math.max(0, Math.min(dt, 0.1));
    lastDt = dtC;

    // Speed scaling
    const speedLevel = Math.floor(distance / DIST_PER_STEP);
    speed = clamp(BASE_SPEED + speedLevel * SPEED_STEP, BASE_SPEED, MAX_SPEED);

    let effectiveSpeed = speed;
    if (nitroActive && nitroFuel > 0) {
      effectiveSpeed *= 1.5;
      nitroFuel -= dtC * 22;
      fuel -= FUEL_DRAIN * dtC * 1.35;
    } else {
      nitroActive = false;
      fuel -= FUEL_DRAIN * dtC;
    }

    distance += effectiveSpeed * dtC;

    if (fuel <= 0) { fuel = 0; endGame(); return; }
    if (laneSwitchCooldown > 0) laneSwitchCooldown -= dtC;

    // ── Smooth lane switching (dramatic) ──
    playerY = canvas.height * PLAYER_Y_RATIO;
    playerX = LANE_CX[playerLane];

    // Detect lane switch for effects
    if (playerLane !== prevLane) {
      switchDustTimer = 0.15;
      sfxSwitch();
      prevLane = playerLane;
    }
    if (switchDustTimer > 0) switchDustTimer -= dtC;

    displayX = lerp(displayX, playerX, 1 - Math.exp(-LANE_SWITCH_SPEED * dtC));

    // Dramatic tilt — more lean during switches
    const horzDiff = playerX - displayX;
    const targetTilt = horzDiff * 0.07;
    tiltAngle = lerp(tiltAngle, targetTilt, 1 - Math.exp(-18 * dtC));

    // Squash & stretch — compress horizontally during quick movement
    const absHDiff = Math.abs(horzDiff);
    const targetSquash = 1 - (absHDiff / LANE_W) * 0.3;
    squashScale = lerp(squashScale, clamp(targetSquash, 0.85, 1), 1 - Math.exp(-15 * dtC));

    // ── Move objects ──
    const scrollSpeed = effectiveSpeed;
    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].y += scrollSpeed * dtC;
      if (obstacles[i].y > canvas.height + 100) obstacles.splice(i, 1);
    }
    for (let i = collectibles.length - 1; i >= 0; i--) {
      collectibles[i].y += scrollSpeed * dtC;
      if (collectibles[i].y > canvas.height + 80) collectibles.splice(i, 1);
    }

    // ── Spawn obstacles ──
    // Continuous difficulty: max obstacles +1 every 700m, gap shrinks with distance
    const maxObs = 1 + Math.floor(distance / 700);
    const gapDist = GAP_DIST_BASE / (1 + distance / 500);

    if (distance - lastObstacleDist > gapDist && obstacles.length < maxObs) {
      // Check which lanes are blocked near the spawn zone (top of screen)
      const nearSpawn = obstacles.filter(o => o.y < canvas.height * 0.25);
      const blockedLanes = new Set();
      nearSpawn.forEach(o => o.lanes.forEach(l => blockedLanes.add(l)));

      // Only spawn if at least 1 lane is free (always leave a path)
      if (blockedLanes.size < LANES) {
        spawnObstacle();
        lastObstacleDist = distance;
      }
    }

    // ── Spawn collectibles ──
    if (Math.random() < COLLECTIBLE_CHANCE * dtC * (speed / BASE_SPEED)) {
      spawnCollectible();
    }

    // ── Collisions ──
    const pw = scaleV(46), ph = scaleV(74);
    for (const obs of obstacles) {
      const sx = scaleX(displayX), sy = playerY;
      const ox = scaleX(obs.x), oy = obs.y;
      const ow = obs.w ? scaleV(obs.w) : 0;
      const oh = obs.h ? scaleV(obs.h) : 0;
      const or = obs.r ? scaleV(obs.r) : 0;

      if (checkCollision(ox, oy, ow, oh, or, obs.lanes, playerLane, sx, sy, pw, ph)) {
        endGame();
        return;
      }

      // Near-miss detection
      const nearDist = scaleV(18);
      if (obs.lanes.includes(playerLane) && oy > sy - ph && oy < sy + ph) {
        const dist = Math.abs(oy - sy);
        if (dist < nearDist + ph / 2) {
          if (nearMissTimer <= 0) sfxNearMiss();
          nearMissTimer = 0.15;
        }
      }
    }

    // ── Pickups ──
    for (let i = collectibles.length - 1; i >= 0; i--) {
      const c = collectibles[i];
      const cx = scaleX(c.x), cy = c.y;
      const sx = scaleX(displayX), sy = playerY;
      if (Math.hypot(cx - sx, cy - sy) < scaleV(38)) {
        if (c.type === 'fruit') {
          score += 100;
          spawnCollectFX(c.x, cy, '#FF6B35');
          sfxPickup();
        } else {
          fuel = clamp(fuel + FUEL_PICKUP, 0, FUEL_MAX);
          spawnCollectFX(c.x, cy, '#D9442F');
          sfxFuelPickup();
        }
        collectibles.splice(i, 1);
      }
    }

    // ── Effects ──
    // Normal dust trail
    if (Math.random() < 45 * dtC) spawnDust(displayX, playerY + scaleV(24), 2);
    // Extra dust burst during lane switch
    if (switchDustTimer > 0 && Math.random() < 60 * dtC) {
      spawnDust(displayX, playerY + scaleV(10), 3);
    }
    if (nearMissTimer > 0) nearMissTimer -= dtC;
    if (shakeTimer > 0) shakeTimer -= dtC;
    updateParticles(dtC);
    updateEngine(effectiveSpeed);

    // ── Move atmosphere ──
    treesL.forEach(t => { t.y += scrollSpeed * 0.13 * dtC; if (t.y > canvas.height + 80) t.y = -80; });
    treesR.forEach(t => { t.y += scrollSpeed * 0.13 * dtC; if (t.y > canvas.height + 80) t.y = -80; });

    birds.forEach(b => {
      b.x += b.speed * dtC;
      if (b.x > GAME_W + 60) b.x = -60;
      if (b.x < -60) b.x = GAME_W + 60;
    });
  }

  function endGame() {
    state = 'over';
    stopEngine();
    sfxCrash();
    if (score > highScore) { highScore = score; safeLS('wildrun_hs', highScore); }
    if (distance > highDist) { highDist = Math.floor(distance); safeLS('wildrun_hd', highDist); }
    shakeTimer = 0.35;
  }

  // ═══════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════
  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    if (shakeTimer > 0) {
      const s = shakeTimer * 22;
      ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
    }

    drawSky();
    drawClouds(lastDt);
    drawMountains();
    drawBirds();

    drawGrass(0, scaleX(GRASS_W));
    drawGrass(scaleX(GAME_W - GRASS_W), scaleX(GRASS_W));
    drawRoad();

    // Trees
    const scrSpd = speed * (nitroActive ? 1.5 : 1);
    treesL.forEach(t => drawTree(t, scrSpd));
    treesR.forEach(t => drawTree(t, scrSpd));

    // Collectibles
    collectibles.forEach(c => {
      const sx = scaleX(c.x), sy = c.y;
      if (c.type === 'fruit') drawFruit(sx, sy, scaleV(15));
      else drawFuelCan(sx, sy, scaleV(26), scaleV(32));
    });

    // Obstacles
    obstacles.forEach(obs => {
      const sx = scaleX(obs.x), sy = obs.y;
      switch (obs.type) {
        case 'deer': drawDeer(sx, sy, scaleV(obs.w || 44)); break;
        case 'bear': drawBear(sx, sy, scaleV(obs.w || 55)); break;
        case 'sheep':  drawSheep(sx, sy, scaleV(obs.w || 48)); break;
      }
    });

    // Player jeep
    const jw = scaleV(54), jh = scaleV(80);
    drawJeep(scaleX(displayX), playerY, jw, jh, tiltAngle, squashScale);

    // Nitro flames
    if (nitroActive && nitroFuel > 0) {
      for (let i = 0; i < 4; i++) {
        const fx = scaleX(displayX) + rand(-12, 12);
        const fy = playerY + jh * 0.38 + rand(0, 18);
        ctx.fillStyle = `rgba(255,${140 + rand(0, 90)},0,${0.5 + rand(0, 0.5)})`;
        ctx.beginPath();
        ctx.arc(fx, fy, rand(3, 8), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Speed lines at high speed
    if (speed > BASE_SPEED * 1.5) {
      const intensity = (speed - BASE_SPEED * 1.5) / (MAX_SPEED - BASE_SPEED * 1.5);
      ctx.strokeStyle = `rgba(255,255,255,${intensity * 0.12})`;
      ctx.lineWidth = 1;
      const sx = scaleX(ROAD_X), sw = scaleX(ROAD_W);
      for (let i = 0; i < 4; i++) {
        const lx = sx + rand(10, sw - 10);
        ctx.beginPath();
        ctx.moveTo(lx, rand(0, canvas.height));
        ctx.lineTo(lx - rand(10, 30), rand(0, canvas.height));
        ctx.stroke();
      }
    }

    drawParticles();
    ctx.restore();

    if (state === 'playing') drawHUD();
    if (state === 'title') drawTitleScreen();
    if (state === 'over') drawGameOverScreen();
    drawMuteButton();
  }

  // ═══════════════════════════════════════
  // GAME LOOP
  // ═══════════════════════════════════════
  function gameLoop(ts) {
    const dt = (ts - lastFrameTime) / 1000;
    lastFrameTime = ts;
    frameCount++;
    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  // ═══════════════════════════════════════
  // INPUT
  // ═══════════════════════════════════════
  function moveLeft() {
    if (state === 'playing' && laneSwitchCooldown <= 0 && playerLane > 0) {
      playerLane--;
      laneSwitchCooldown = 0.06;
    }
  }
  function moveRight() {
    if (state === 'playing' && laneSwitchCooldown <= 0 && playerLane < LANES - 1) {
      playerLane++;
      laneSwitchCooldown = 0.06;
    }
  }
  function boostOn() {
    if (state === 'playing') { nitroActive = true; if (nitroFuel <= 0) nitroFuel = 60; }
  }
  function boostOff() { nitroActive = false; }

  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
    if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
    if (e.key === 'ArrowUp' || e.key === 'w') boostOn();
    if (e.key === ' ' || e.key === 'Enter') {
      if (state === 'title' || state === 'over') startGame();
    }
    e.preventDefault();
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp' || e.key === 'w') boostOff();
  });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const tx = t.clientX, ty = t.clientY;
      const rect = canvas.getBoundingClientRect();
      if (state === 'title' || state === 'over') { startGame(); return; }
      if (state === 'playing') {
        if (tx < rect.left + canvas.width / 2) moveLeft();
        else moveRight();
        if (ty < rect.top + canvas.height * 0.4) boostOn();
      }
    }
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.clientY < canvas.getBoundingClientRect().top + canvas.height * 0.4) boostOn();
      else boostOff();
    }
  }, { passive: false });
  canvas.addEventListener('touchend', e => { e.preventDefault(); boostOff(); }, { passive: false });
  canvas.addEventListener('touchcancel', e => { e.preventDefault(); boostOff(); }, { passive: false });

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;

    // Mute button (always clickable)
    if (canvas._muteBtn) {
      const b = canvas._muteBtn;
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        initAudio();
        sfxClick();
        toggleMute();
        return;
      }
    }

    if (state === 'title' && canvas._startBtn) {
      const b = canvas._startBtn;
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) startGame();
    }
    if (state === 'over' && canvas._restartBtn) {
      const b = canvas._restartBtn;
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) startGame();
    }
  });

  function startGame() {
    resetGame();
    state = 'playing';
    initAudio();
    if (!muted) startEngine();
    lastFrameTime = performance.now();
  }

  // ═══════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════
  function init() {
    // Restore mute preference
    const savedMute = safeLS('wildrun_muted');
    if (savedMute !== null) muted = savedMute === '1';

    resize();
    playerY = canvas.height * PLAYER_Y_RATIO;
    playerX = LANE_CX[playerLane];
    displayX = playerX;

    for (let i = 0; i < 30; i++) { treesL.push(spawnTree('L')); treesR.push(spawnTree('R')); }
    for (let i = 0; i < 8; i++) clouds.push(spawnCloud());
    for (let i = 0; i < 4; i++) {
      birds.push({
        x: rand(-40, GAME_W + 40),
        y: rand(canvas.height * 0.08, canvas.height * 0.22),
        size: rand(8, 16),
        speed: rand(15, 35) * (Math.random() < 0.5 ? 1 : -1),
        flapSpeed: rand(8, 14),
        phase: rand(0, Math.PI * 2),
      });
    }

    render();
    lastFrameTime = performance.now();
    requestAnimationFrame(gameLoop);

    // Register service worker for offline play
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  }

  init();
})();
</script>
