<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏞️ Wild Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a1a2e;
      display: flex; justify-content: center; align-items: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    canvas {
      display: block;
      max-width: 500px; width: 100%;
      image-rendering: auto;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
  "use strict";

  // ──────────────────────────────────────
  // CANVAS SETUP
  // ──────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const MAX_W = 480;
  const GAME_W = 400;  // internal game width

  function resize() {
    const w = Math.min(window.innerWidth, MAX_W);
    const h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
  }
  window.addEventListener('resize', resize);
  resize();

  // ──────────────────────────────────────
  // CONSTANTS
  // ──────────────────────────────────────
  const GRASS_W = 55;
  const ROAD_X  = GRASS_W;
  const LANES   = 4;
  const ROAD_W  = GAME_W - GRASS_W * 2;
  const LANE_W  = ROAD_W / LANES;
  const LANE_CX = Array.from({length: LANES}, (_, i) => ROAD_X + LANE_W * i + LANE_W / 2);

  const PLAYER_Y_RATIO = 0.78;   // player vertical position
  const BASE_SPEED  = 180;        // px/s at 60fps → 3 px/frame
  const MAX_SPEED   = 540;        // 9 px/frame
  const SPEED_STEP  = 30;         // speed increase per 500m
  const DIST_PER_STEP = 500;

  const FUEL_MAX     = 100;
  const FUEL_DRAIN   = 2.4;       // % per second at base speed (scales with speed)
  const FUEL_PICKUP  = 28;        // fuel gained from can

  const OBSTACLE_MIN_GAP = 0.45;  // seconds between obstacles at base speed
  const COLLECTIBLE_CHANCE = 0.28;

  const PARTICLE_COUNT = 5;       // dust particles per frame

  // ──────────────────────────────────────
  // COLORS — nature palette
  // ──────────────────────────────────────
  const C = {
    sky:       '#87CEEB',
    skyTop:    '#9DD5F0',
    skyBot:    '#E8F0D5',
    mountain1: '#7B9E6D',
    mountain2: '#8DB580',
    dirt:      '#C4A35A',
    dirtDark:  '#B8944A',
    grass1:    '#5D8A3C',
    grass2:    '#4A7A2E',
    gravel:    'rgba(139,119,70,0.4)',
    line:      'rgba(255,255,255,0.55)',
    jeepBody:  '#6B8E4A',
    jeepTop:   '#4A6B30',
    jeepBump:  '#555',
    wheel:     '#2C2C2C',
    wheelHub:  '#888',
    boulder1:  '#8B8680',
    boulder2:  '#7A7570',
    log:       '#8B6914',
    logDark:   '#6B4F10',
    deerBody:  '#C4956A',
    deerSpot:  '#F5E6D3',
    puddle1:   '#7BA7C9',
    puddle2:   '#8CB8D8',
    fruit:     '#FF6B35',
    fruit2:    '#FF8C42',
    leaf:      '#5D9C3E',
    fuelCan:   '#D9442F',
    fuelCap:   '#333',
    dust:      'rgba(180,160,120,0.7)',
    hudBg:     'rgba(0,0,0,0.45)',
    hudText:   '#FFF',
    danger:    '#E74C3C',
    warning:   '#F39C12',
  };

  // ──────────────────────────────────────
  // GAME STATE
  // ──────────────────────────────────────
  let state = 'title';   // title | playing | over
  let score = 0;
  let distance = 0;
  let speed = BASE_SPEED;
  let fuel = FUEL_MAX;
  let playerLane = 1;    // 0..3
  let playerX = LANE_CX[1];
  let playerY = 0;
  let obstacles = [];
  let collectibles = [];
  let particles = [];
  let treesL = [];       // left side trees
  let treesR = [];       // right side trees
  let frameCount = 0;
  let highScore = parseInt(localStorage.getItem('wildrun_hs')) || 0;
  let highDist  = parseInt(localStorage.getItem('wildrun_hd')) || 0;
  let lastObstacleDist = 0;
  let nitroActive = false;
  let nitroFuel = 0;
  let shakeTimer = 0;
  let lastFrameTime = performance.now();
  let laneSwitchCooldown = 0;

  // Input tracking
  let keys = {};
  let touchLeft = false;
  let touchRight = false;
  let touchUp = false;

  // ──────────────────────────────────────
  // HELPERS
  // ──────────────────────────────────────
  function rand(min, max) { return min + Math.random() * (max - min); }
  function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function easeOutQuad(t) { return t * (2 - t); }

  function scaleX(x) { return x * (canvas.width / GAME_W); }
  function scaleY(y) { return y * (canvas.width / GAME_W); }
  function scaleV(v) { return v * (canvas.width / GAME_W); }

  // ──────────────────────────────────────
  // DRAWING HELPERS
  // ──────────────────────────────────────
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ──────────────────────────────────────
  // DRAWING — SCENERY
  // ──────────────────────────────────────
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, C.skyTop);
    grad.addColorStop(0.45, C.skyBot);
    grad.addColorStop(0.7, C.dirt);
    grad.addColorStop(1, C.grass2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawMountains() {
    // Distant mountains
    ctx.fillStyle = C.mountain1;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.28);
    for (let x = 0; x <= canvas.width; x += 2) {
      const y = canvas.height * 0.28 - Math.sin(x * 0.018) * 28 - Math.sin(x * 0.007 + 1) * 22 - Math.sin(x * 0.04) * 10;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height * 0.35);
    ctx.lineTo(0, canvas.height * 0.35);
    ctx.closePath();
    ctx.fill();

    // Closer hills
    ctx.fillStyle = C.mountain2;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.38);
    for (let x = 0; x <= canvas.width; x += 2) {
      const y = canvas.height * 0.38 - Math.sin(x * 0.022 + 2) * 18 - Math.sin(x * 0.009) * 14;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height * 0.48);
    ctx.lineTo(0, canvas.height * 0.48);
    ctx.closePath();
    ctx.fill();
  }

  function drawGrass(x, w) {
    const grad = ctx.createLinearGradient(x, 0, x + w, 0);
    grad.addColorStop(0, C.grass1);
    grad.addColorStop(0.5, C.grass2);
    grad.addColorStop(1, C.grass1);
    ctx.fillStyle = grad;
    ctx.fillRect(x, 0, w, canvas.height);

    // Grass texture lines
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    for (let yy = 0; yy < canvas.height; yy += 6) {
      ctx.beginPath();
      ctx.moveTo(x, yy);
      ctx.lineTo(x + w, yy + (Math.sin(yy * 0.3 + x) * 3));
      ctx.stroke();
    }
  }

  function drawRoad() {
    const sx = scaleX(ROAD_X);
    const sw = scaleX(ROAD_W);

    // Road surface
    const grad = ctx.createLinearGradient(sx, 0, sx + sw, 0);
    grad.addColorStop(0, C.dirtDark);
    grad.addColorStop(0.15, C.dirt);
    grad.addColorStop(0.5, C.dirt);
    grad.addColorStop(0.85, C.dirt);
    grad.addColorStop(1, C.dirtDark);
    ctx.fillStyle = grad;
    ctx.fillRect(sx, 0, sw, canvas.height);

    // Gravel texture
    ctx.fillStyle = C.gravel;
    const dotSpacing = 15;
    for (let yy = (frameCount * 3) % dotSpacing; yy < canvas.height; yy += dotSpacing) {
      for (let xx = sx + 8; xx < sx + sw - 8; xx += dotSpacing + rand(-4, 4)) {
        ctx.beginPath();
        ctx.arc(xx, yy, 0.8 + Math.random() * 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Road edge lines (solid)
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = scaleV(2.5);
    [sx + scaleV(2), sx + sw - scaleV(2)].forEach(ex => {
      ctx.beginPath();
      ctx.moveTo(ex, 0);
      ctx.lineTo(ex, canvas.height);
      ctx.stroke();
    });

    // Lane dashes
    ctx.strokeStyle = C.line;
    ctx.lineWidth = scaleV(2);
    ctx.setLineDash([scaleV(22), scaleV(18)]);
    for (let i = 1; i < LANES; i++) {
      const lx = scaleX(ROAD_X + LANE_W * i);
      ctx.beginPath();
      ctx.moveTo(lx, 0);
      ctx.lineTo(lx, canvas.height);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function spawnTree(side) {
    return {
      x: side === 'L' ? rand(5, GRASS_W - 5) : rand(GAME_W - GRASS_W + 5, GAME_W - 5),
      y: rand(-200, canvas.height + 100),
      size: rand(14, 32),
      sway: rand(0, Math.PI * 2),
    };
  }

  function drawTree(tree, scrollSpeed) {
    tree.y += scrollSpeed * 0.15;
    if (tree.y > canvas.height + 60) tree.y = -60;
    if (tree.y < -60) tree.y = canvas.height + 60;

    const x = scaleX(tree.x);
    const y = tree.y;
    const s = scaleV(tree.size);

    // Trunk
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(x - s * 0.15, y, s * 0.3, s * 0.6);

    // Canopy layers
    const swayOffset = Math.sin(frameCount * 0.02 + tree.sway) * s * 0.08;
    ctx.fillStyle = '#3D6B24';
    ctx.beginPath();
    ctx.arc(x + swayOffset, y - s * 0.1, s * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4A8230';
    ctx.beginPath();
    ctx.arc(x + swayOffset + s * 0.1, y - s * 0.15, s * 0.38, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5A9E38';
    ctx.beginPath();
    ctx.arc(x + swayOffset - s * 0.05, y - s * 0.2, s * 0.32, 0, Math.PI * 2);
    ctx.fill();
  }

  // ──────────────────────────────────────
  // DRAWING — PLAYER JEEP
  // ──────────────────────────────────────
  function drawJeep(x, y, w, h) {
    ctx.save();
    ctx.translate(x, y);

    const bw = w, bh = h;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, bh * 0.08, bw * 0.46, bh * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wheels
    const wheelW = bw * 0.18, wheelH = bh * 0.22;
    const wheelY = bh * 0.12;
    const wheelOffsets = [-bw * 0.32, bw * 0.32];
    wheelOffsets.forEach(wx => {
      ctx.fillStyle = C.wheel;
      roundRect(wx - wheelW / 2, wheelY, wheelW, wheelH, wheelW * 0.25);
      ctx.fill();
      ctx.fillStyle = C.wheelHub;
      ctx.beginPath();
      ctx.arc(wx, wheelY + wheelH / 2, wheelW * 0.28, 0, Math.PI * 2);
      ctx.fill();
    });

    // Body
    ctx.fillStyle = C.jeepBody;
    roundRect(-bw * 0.44, -bh * 0.15, bw * 0.88, bh * 0.55, bw * 0.08);
    ctx.fill();

    // Darker bottom trim
    ctx.fillStyle = C.jeepTop;
    ctx.fillRect(-bw * 0.44, bh * 0.1, bw * 0.88, bh * 0.1);

    // Cabin (windshield area)
    ctx.fillStyle = C.jeepTop;
    roundRect(-bw * 0.18, -bh * 0.4, bw * 0.36, bh * 0.42, bw * 0.05);
    ctx.fill();

    // Windshield
    ctx.fillStyle = '#B8D8E8';
    roundRect(-bw * 0.14, -bh * 0.34, bw * 0.28, bh * 0.18, bw * 0.03);
    ctx.fill();
    // Windshield reflection
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.moveTo(-bw * 0.1, -bh * 0.34);
    ctx.lineTo(-bw * 0.02, -bh * 0.2);
    ctx.lineTo(bw * 0.08, -bh * 0.2);
    ctx.lineTo(bw * 0.08, -bh * 0.34);
    ctx.fill();

    // Bumper
    ctx.fillStyle = C.jeepBump;
    roundRect(-bw * 0.42, -bh * 0.22, bw * 0.84, bh * 0.1, bw * 0.04);
    ctx.fill();

    // Headlights
    ctx.fillStyle = '#FFEAA7';
    ctx.beginPath();
    ctx.arc(-bw * 0.38, -bh * 0.12, bw * 0.07, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bw * 0.38, -bh * 0.12, bw * 0.07, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // ──────────────────────────────────────
  // DRAWING — OBSTACLES
  // ──────────────────────────────────────
  function drawBoulder(x, y, r) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.arc(x + r * 0.1, y + r * 0.1, r, 0, Math.PI * 2);
    ctx.fill();
    // Body
    const grad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.25, r * 0.1, x, y, r);
    grad.addColorStop(0, C.boulder1);
    grad.addColorStop(1, C.boulder2);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.arc(x - r * 0.2, y - r * 0.25, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawLog(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + w * 0.02, y + h * 0.25, w / 2, h / 2.5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = C.log;
    roundRect(x - w / 2, y - h / 2, w, h, h / 3);
    ctx.fill();
    // Bark lines
    ctx.strokeStyle = C.logDark;
    ctx.lineWidth = 1.2;
    for (let i = 1; i <= 4; i++) {
      const lx = x - w / 2 + (w / 5) * i;
      ctx.beginPath();
      ctx.moveTo(lx, y - h / 2 + 2);
      ctx.lineTo(lx, y + h / 2 - 2);
      ctx.stroke();
    }
    // End circles
    ctx.fillStyle = C.logDark;
    ctx.beginPath();
    ctx.arc(x - w / 2 + 1, y, h / 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + w / 2 - 1, y, h / 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawDeer(x, y, s) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.45, s * 0.42, s * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = s * 0.08;
    ctx.lineCap = 'round';
    [[-0.2, 0.2], [0.1, 0.2], [-0.15, -0.1], [0.15, -0.1]].forEach(([lx, ly]) => {
      ctx.beginPath();
      ctx.moveTo(x + lx * s, y - s * 0.05);
      ctx.lineTo(x + lx * s, y + s * 0.35);
      ctx.stroke();
    });

    // Body
    ctx.fillStyle = C.deerBody;
    ctx.beginPath();
    ctx.ellipse(x, y - s * 0.05, s * 0.4, s * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();

    // Belly
    ctx.fillStyle = C.deerSpot;
    ctx.beginPath();
    ctx.ellipse(x, y, s * 0.28, s * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Neck & Head
    ctx.fillStyle = C.deerBody;
    ctx.beginPath();
    ctx.ellipse(x + s * 0.32, y - s * 0.15, s * 0.15, s * 0.28, Math.PI * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.beginPath();
    ctx.arc(x + s * 0.38, y - s * 0.34, s * 0.13, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(x + s * 0.43, y - s * 0.37, s * 0.03, 0, Math.PI * 2);
    ctx.fill();

    // Antlers (simple)
    ctx.strokeStyle = '#5C3D1E';
    ctx.lineWidth = s * 0.04;
    ctx.beginPath();
    ctx.moveTo(x + s * 0.35, y - s * 0.44);
    ctx.lineTo(x + s * 0.28, y - s * 0.62);
    ctx.moveTo(x + s * 0.35, y - s * 0.44);
    ctx.lineTo(x + s * 0.42, y - s * 0.58);
    ctx.stroke();
  }

  function drawPuddle(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(x + w * 0.03, y + h * 0.15, w / 2, h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    const grad = ctx.createRadialGradient(x, y, w * 0.1, x, y, w / 1.5);
    grad.addColorStop(0, C.puddle2);
    grad.addColorStop(1, C.puddle1);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ripple
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.ellipse(x - w * 0.1, y - h * 0.1, w * 0.25, h * 0.2, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // ──────────────────────────────────────
  // DRAWING — COLLECTIBLES
  // ──────────────────────────────────────
  function drawFruit(x, y, r) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.arc(x + r * 0.1, y + r * 0.15, r * 0.8, 0, Math.PI * 2);
    ctx.fill();

    // Body
    const grad = ctx.createRadialGradient(x - r * 0.2, y - r * 0.25, r * 0.1, x, y, r);
    grad.addColorStop(0, C.fruit2);
    grad.addColorStop(1, C.fruit);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    // Leaf
    ctx.fillStyle = C.leaf;
    ctx.beginPath();
    ctx.ellipse(x + r * 0.25, y - r * 0.85, r * 0.5, r * 0.2, Math.PI * 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(x - r * 0.2, y - r * 0.25, r * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawFuelCan(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(x + w * 0.05, y + h * 0.15, w / 2.2, h / 3, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = C.fuelCan;
    roundRect(x - w / 2, y - h / 2, w, h, w * 0.2);
    ctx.fill();

    // Cap
    ctx.fillStyle = C.fuelCap;
    ctx.fillRect(x - w * 0.12, y - h / 2 - h * 0.12, w * 0.24, h * 0.14);

    // "F" label
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${w * 0.45}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('F', x, y - h * 0.02);
  }

  // ──────────────────────────────────────
  // PARTICLES
  // ──────────────────────────────────────
  function spawnDust(x, y) {
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: x + rand(-12, 12),
        y: y + rand(-5, 10),
        vx: rand(-0.6, 0.6),
        vy: rand(0.3, 1.2),
        life: rand(0.4, 0.9),
        maxLife: 0.8,
        size: rand(2, 5),
        type: 'dust',
      });
    }
  }

  function spawnCollectFX(x, y, color) {
    for (let i = 0; i < 8; i++) {
      const angle = rand(0, Math.PI * 2);
      const speed = rand(2, 5);
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.5,
        maxLife: 0.5,
        size: rand(2, 4),
        type: 'spark',
        color: color,
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      p.x += p.vx;
      p.y += p.vy;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      const alpha = clamp(p.life / p.maxLife, 0, 1);
      if (p.type === 'dust') {
        ctx.fillStyle = `rgba(180,150,110,${alpha * 0.6})`;
        ctx.beginPath();
        ctx.arc(scaleX(p.x), p.y, scaleV(p.size), 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === 'spark') {
        ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
        if (p.color.startsWith('#')) {
          ctx.fillStyle = p.color; // fallback, slight opacity loss
          ctx.globalAlpha = alpha;
        }
        ctx.beginPath();
        ctx.arc(scaleX(p.x), p.y, scaleV(p.size), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    });
  }

  // ──────────────────────────────────────
  // GAME OBJECT SPAWNING
  // ──────────────────────────────────────
  const OBSTACLE_TYPES = ['boulder', 'log', 'deer', 'puddle'];

  function spawnObstacle() {
    const type = OBSTACLE_TYPES[randInt(0, OBSTACLE_TYPES.length - 1)];
    const lane = randInt(0, LANES - 1);
    const x = LANE_CX[lane];
    const y = -40;
    let w = 0, h = 0, r = 0;
    let occupiesLanes = [lane];

    switch (type) {
      case 'boulder':
        r = rand(18, 28);
        break;
      case 'log':
        w = rand(55, 85);
        h = rand(14, 22);
        // Log can span 2 lanes
        if (Math.random() < 0.3 && lane < LANES - 1) {
          occupiesLanes.push(lane + 1);
          w += LANE_W;
        }
        break;
      case 'deer':
        w = rand(30, 48);
        h = rand(35, 50);
        break;
      case 'puddle':
        w = rand(50, 80);
        h = rand(30, 45);
        if (Math.random() < 0.25 && lane < LANES - 1) {
          occupiesLanes.push(lane + 1);
          w += LANE_W * 0.8;
        }
        break;
    }

    obstacles.push({ type, x, y, w, h, r, lanes: occupiesLanes });
  }

  function spawnCollectible() {
    const lane = randInt(0, LANES - 1);
    const isFuel = Math.random() < 0.3;
    collectibles.push({
      x: LANE_CX[lane],
      y: -30,
      type: isFuel ? 'fuel' : 'fruit',
    });
  }

  // ──────────────────────────────────────
  // COLLISION DETECTION
  // ──────────────────────────────────────
  function checkCollision(ox, oy, ow, oh, or, lanes, playerLane, px, py, pw, ph) {
    // Lane-based check: player must be in one of the obstacle's lanes
    if (!lanes.includes(playerLane)) return false;

    // AABB check with some tolerance
    if (or) {
      // Circle collision
      const cx = ox, cy = oy;
      const closestX = clamp(cx, px - pw / 2, px + pw / 2);
      const closestY = clamp(cy, py - ph / 2, py + ph / 2);
      const distX = cx - closestX;
      const distY = cy - closestY;
      return (distX * distX + distY * distY) < (or * or);
    } else {
      // Rectangle collision
      const margin = pw * 0.2;
      return (
        px + pw / 2 - margin > ox - ow / 2 &&
        px - pw / 2 + margin < ox + ow / 2 &&
        py + ph / 2 - margin * 0.5 > oy - oh / 2 &&
        py - ph / 2 + margin * 0.5 < oy + oh / 2
      );
    }
  }

  // ──────────────────────────────────────
  // HUD
  // ──────────────────────────────────────
  function drawHUD() {
    const pad = scaleV(12);
    const fontSize = scaleV(14);

    // Background bars
    ctx.fillStyle = C.hudBg;
    roundRect(scaleX(4), 4, scaleX(GAME_W - 8), scaleV(36), scaleV(8));
    ctx.fill();

    // Score
    ctx.fillStyle = C.hudText;
    ctx.font = `bold ${fontSize}px system-ui, sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(`🍎 ${score}`, pad + scaleV(4), scaleV(22));

    // Distance
    ctx.textAlign = 'center';
    ctx.fillText(`${Math.floor(distance)}m`, scaleX(GAME_W / 2), scaleV(22));

    // High score (small)
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = `${fontSize * 0.75}px system-ui, sans-serif`;
    ctx.fillText(`Best: ${highScore}`, scaleX(GAME_W / 2), scaleV(34));

    // Fuel gauge
    const fuelW = scaleV(60), fuelH = scaleV(10);
    const fuelX = scaleX(GAME_W - GRASS_W - 2) - fuelW, fuelY = scaleV(16);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(fuelX - 1, fuelY - 1, fuelW + 2, fuelH + 2, fuelH / 2 + 1);
    ctx.fill();

    const fuelPct = clamp(fuel / FUEL_MAX, 0, 1);
    const fuelGrad = ctx.createLinearGradient(fuelX, 0, fuelX + fuelW, 0);
    if (fuelPct > 0.4) {
      fuelGrad.addColorStop(0, '#4CAF50');
      fuelGrad.addColorStop(1, '#66BB6A');
    } else if (fuelPct > 0.2) {
      fuelGrad.addColorStop(0, C.warning);
      fuelGrad.addColorStop(1, '#F5B041');
    } else {
      fuelGrad.addColorStop(0, C.danger);
      fuelGrad.addColorStop(1, '#E74C3C');
    }
    ctx.fillStyle = fuelGrad;
    roundRect(fuelX, fuelY, fuelW * fuelPct, fuelH, fuelH / 2);
    ctx.fill();

    ctx.fillStyle = C.hudText;
    ctx.font = `${fontSize * 0.7}px system-ui, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText('⛽', fuelX - scaleV(4), scaleV(22));

    // Speed indicator
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${fontSize * 0.7}px system-ui, sans-serif`;
    ctx.textAlign = 'right';
    const speedKph = Math.round(speed / 180 * 60);
    ctx.fillText(`${speedKph} km/h`, scaleX(GAME_W - GRASS_W - 2), scaleV(36));
  }

  // ──────────────────────────────────────
  // SCREENS
  // ──────────────────────────────────────
  function drawTitleScreen() {
    // Dim overlay
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height * 0.38;

    // Title
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${scaleV(38)}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🏞️ Wild Run', cx, cy - scaleV(40));

    // Subtitle
    ctx.fillStyle = '#DFE6C8';
    ctx.font = `${scaleV(15)}px system-ui, sans-serif`;
    ctx.fillText('Race through the wilderness', cx, cy + scaleV(4));

    // Instructions box
    const boxY = cy + scaleV(35);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(cx - scaleX(140), boxY, scaleX(280), scaleV(130), scaleV(12));
    ctx.fill();

    ctx.fillStyle = '#EEE';
    ctx.font = `${scaleV(13)}px system-ui, sans-serif`;
    const instructions = [
      '⬅ ➡  Switch lanes to dodge obstacles',
      '⬆  Hold for nitro boost',
      '🍎 Collect fruit for points',
      '⛽ Grab fuel cans to keep going',
      '',
      '📱 Tap sides to steer • Swipe up to boost',
    ];
    instructions.forEach((line, i) => {
      ctx.fillText(line, cx, boxY + scaleV(20) + i * scaleV(20));
    });

    // Start button
    const btnY = boxY + scaleV(150);
    ctx.fillStyle = '#FF6B35';
    roundRect(cx - scaleX(70), btnY, scaleX(140), scaleV(44), scaleV(22));
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${scaleV(17)}px system-ui, sans-serif`;
    ctx.fillText('START', cx, btnY + scaleV(22));

    // High score
    if (highScore > 0) {
      ctx.fillStyle = '#FFD93D';
      ctx.font = `${scaleV(12)}px system-ui, sans-serif`;
      ctx.fillText(`🏆 Best: ${highScore} pts  •  ${highDist}m`, cx, btnY + scaleV(60));
    }

    // Store button area for click detection
    canvas._startBtn = { x: cx - scaleX(70), y: btnY, w: scaleX(140), h: scaleV(44) };
  }

  function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height * 0.35;

    ctx.fillStyle = '#FF6B35';
    ctx.font = `bold ${scaleV(34)}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Game Over', cx, cy - scaleV(20));

    // Stats
    const statsY = cy + scaleV(25);
    ctx.fillStyle = '#FFF';
    ctx.font = `${scaleV(18)}px system-ui, sans-serif`;
    ctx.fillText(`🍎 Score: ${score}`, cx, statsY);
    ctx.fillText(`📏 Distance: ${Math.floor(distance)}m`, cx, statsY + scaleV(30));

    // New best?
    let newBest = false;
    if (score > highScore) {
      newBest = true;
      highScore = score;
      localStorage.setItem('wildrun_hs', highScore);
    }
    if (distance > highDist) {
      highDist = Math.floor(distance);
      localStorage.setItem('wildrun_hd', highDist);
    }

    if (newBest) {
      ctx.fillStyle = '#FFD93D';
      ctx.font = `bold ${scaleV(16)}px system-ui, sans-serif`;
      ctx.fillText('🌟 New High Score! 🌟', cx, statsY + scaleV(60));
    }

    // Restart button
    const btnY = statsY + scaleV(90);
    ctx.fillStyle = '#4CAF50';
    roundRect(cx - scaleX(80), btnY, scaleX(160), scaleV(44), scaleV(22));
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${scaleV(17)}px system-ui, sans-serif`;
    ctx.fillText('PLAY AGAIN', cx, btnY + scaleV(22));

    canvas._restartBtn = { x: cx - scaleX(80), y: btnY, w: scaleX(160), h: scaleV(44) };
  }

  // ──────────────────────────────────────
  // GAME LOGIC
  // ──────────────────────────────────────
  function resetGame() {
    score = 0;
    distance = 0;
    speed = BASE_SPEED;
    fuel = FUEL_MAX;
    playerLane = 1;
    playerX = LANE_CX[1];
    obstacles = [];
    collectibles = [];
    particles = [];
    lastObstacleDist = 0;
    nitroActive = false;
    nitroFuel = 0;
    shakeTimer = 0;
    laneSwitchCooldown = 0;
  }

  function update(dt) {
    if (state !== 'playing') return;

    // dt is in seconds, clamp to avoid huge jumps
    const dtClamped = Math.min(dt, 0.1);

    // Speed increases with distance
    const speedLevel = Math.floor(distance / DIST_PER_STEP);
    speed = clamp(BASE_SPEED + speedLevel * SPEED_STEP, BASE_SPEED, MAX_SPEED);

    // Nitro
    if (nitroActive && nitroFuel > 0) {
      const nitroMult = 1.5;
      const effectiveSpeed = speed * nitroMult;
      nitroFuel -= dtClamped * 20;
      distance += effectiveSpeed * dtClamped;
      fuel -= FUEL_DRAIN * dtClamped * 1.3; // faster fuel drain on nitro
    } else {
      nitroActive = false;
      distance += speed * dtClamped;
      fuel -= FUEL_DRAIN * dtClamped;
    }

    if (fuel <= 0) {
      fuel = 0;
      endGame();
      return;
    }

    // Cooldown
    if (laneSwitchCooldown > 0) laneSwitchCooldown -= dtClamped;

    // Update player position
    playerY = canvas.height * PLAYER_Y_RATIO;
    playerX = LANE_CX[playerLane];

    // Move obstacles
    const scrollSpeed = speed * (nitroActive ? 1.5 : 1);
    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].y += scrollSpeed * dtClamped;
      if (obstacles[i].y > canvas.height + 80) {
        obstacles.splice(i, 1);
      }
    }

    // Move collectibles
    for (let i = collectibles.length - 1; i >= 0; i--) {
      collectibles[i].y += scrollSpeed * dtClamped;
      if (collectibles[i].y > canvas.height + 60) {
        collectibles.splice(i, 1);
      }
    }

    // Spawn obstacles
    const gapSeconds = OBSTACLE_MIN_GAP * (BASE_SPEED / speed);
    if (distance - lastObstacleDist > speed * gapSeconds * 1.2) {
      spawnObstacle();
      lastObstacleDist = distance;
      // Sometimes spawn pairs
      if (Math.random() < 0.3 && speed > BASE_SPEED * 1.3) {
        setTimeout(() => {
          if (state === 'playing') spawnObstacle();
        }, rand(200, 500));
      }
    }

    // Spawn collectibles
    if (Math.random() < COLLECTIBLE_CHANCE * dtClamped * (speed / BASE_SPEED)) {
      spawnCollectible();
    }

    // Check collisions with obstacles
    const pw = scaleV(44), ph = scaleV(70);
    for (const obs of obstacles) {
      const sx = scaleX(obs.x), sy = obs.y;
      const sw = obs.w ? scaleV(obs.w) : 0;
      const sh = obs.h ? scaleV(obs.h) : 0;
      const sr = obs.r ? scaleV(obs.r) : 0;
      const px = scaleX(playerX), py = playerY;

      if (checkCollision(sx, sy, sw, sh, sr, obs.lanes, playerLane, px, py, pw, ph)) {
        endGame();
        return;
      }
    }

    // Check collectible pickups
    for (let i = collectibles.length - 1; i >= 0; i--) {
      const c = collectibles[i];
      const cx = scaleX(c.x), cy = c.y;
      const px = scaleX(playerX), py = playerY;
      const dist = Math.hypot(cx - px, cy - py);
      const pickupRadius = scaleV(36);

      if (dist < pickupRadius) {
        if (c.type === 'fruit') {
          score += 100;
          spawnCollectFX(cx, cy, '#FF6B35');
        } else if (c.type === 'fuel') {
          fuel = clamp(fuel + FUEL_PICKUP, 0, FUEL_MAX);
          spawnCollectFX(cx, cy, '#D9442F');
        }
        collectibles.splice(i, 1);
      }
    }

    // Dust particles from player (time-based)
    if (Math.random() < 40 * dtClamped) {
      spawnDust(scaleX(playerX), playerY + scaleV(20));
    }

    updateParticles(dtClamped);

    // Screen shake decay
    if (shakeTimer > 0) shakeTimer -= dtClamped;

    // Update trees (parallax)
    const treeSpeed = scrollSpeed;
    treesL.forEach(t => { t.y += treeSpeed * 0.12 * dtClamped; if (t.y > canvas.height + 60) t.y = -60; });
    treesR.forEach(t => { t.y += treeSpeed * 0.12 * dtClamped; if (t.y > canvas.height + 60) t.y = -60; });
  }

  function endGame() {
    state = 'over';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('wildrun_hs', highScore);
    }
    if (distance > highDist) {
      highDist = Math.floor(distance);
      localStorage.setItem('wildrun_hd', highDist);
    }
    shakeTimer = 0.3;
  }

  // ──────────────────────────────────────
  // RENDER
  // ──────────────────────────────────────
  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Screen shake
    ctx.save();
    if (shakeTimer > 0) {
      const sx = (Math.random() - 0.5) * shakeTimer * 20;
      const sy = (Math.random() - 0.5) * shakeTimer * 20;
      ctx.translate(sx, sy);
    }

    drawSky();
    drawMountains();

    // Grass sides
    drawGrass(0, scaleX(GRASS_W));
    drawGrass(scaleX(GAME_W - GRASS_W), scaleX(GRASS_W));

    drawRoad();

    // Trees
    treesL.forEach(t => drawTree(t, speed * (nitroActive ? 1.5 : 1)));
    treesR.forEach(t => drawTree(t, speed * (nitroActive ? 1.5 : 1)));

    // Collectibles
    collectibles.forEach(c => {
      const sx = scaleX(c.x), sy = c.y;
      if (c.type === 'fruit') drawFruit(sx, sy, scaleV(14));
      else drawFuelCan(sx, sy, scaleV(24), scaleV(30));
    });

    // Obstacles
    obstacles.forEach(obs => {
      const sx = scaleX(obs.x), sy = obs.y;
      switch (obs.type) {
        case 'boulder': drawBoulder(sx, sy, scaleV(obs.r)); break;
        case 'log': drawLog(sx, sy, scaleV(obs.w), scaleV(obs.h)); break;
        case 'deer': drawDeer(sx, sy, scaleV(obs.w || obs.h || 40)); break;
        case 'puddle': drawPuddle(sx, sy, scaleV(obs.w), scaleV(obs.h)); break;
      }
    });

    // Player jeep
    const jw = scaleV(50), jh = scaleV(75);
    drawJeep(scaleX(playerX), playerY, jw, jh);

    // Nitro flames
    if (nitroActive && nitroFuel > 0) {
      for (let i = 0; i < 3; i++) {
        const fx = scaleX(playerX) + rand(-10, 10);
        const fy = playerY + jh * 0.4 + rand(0, 15);
        ctx.fillStyle = `rgba(255,${140 + rand(0,80)},0,${0.6 + rand(0,0.4)})`;
        ctx.beginPath();
        ctx.arc(fx, fy, rand(3, 7), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Particles
    drawParticles();

    ctx.restore();

    // HUD (no shake)
    if (state === 'playing') drawHUD();

    // Screens
    if (state === 'title') drawTitleScreen();
    if (state === 'over') drawGameOverScreen();
  }

  // ──────────────────────────────────────
  // GAME LOOP
  // ──────────────────────────────────────
  function gameLoop(timestamp) {
    const dt = (timestamp - lastFrameTime) / 1000;
    lastFrameTime = timestamp;
    frameCount++;

    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  // ──────────────────────────────────────
  // INPUT
  // ──────────────────────────────────────
  function moveLeft() {
    if (state === 'playing' && laneSwitchCooldown <= 0) {
      if (playerLane > 0) { playerLane--; laneSwitchCooldown = 0.08; }
    }
  }

  function moveRight() {
    if (state === 'playing' && laneSwitchCooldown <= 0) {
      if (playerLane < LANES - 1) { playerLane++; laneSwitchCooldown = 0.08; }
    }
  }

  function boostOn() {
    if (state === 'playing') {
      nitroActive = true;
      if (nitroFuel <= 0) nitroFuel = 100;
    }
  }

  function boostOff() {
    nitroActive = false;
  }

  // Keyboard
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
    if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
    if (e.key === 'ArrowUp' || e.key === 'w') boostOn();
    if (e.key === ' ' || e.key === 'Enter') {
      if (state === 'title') startGame();
      if (state === 'over') startGame();
    }
    e.preventDefault();
  });

  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp' || e.key === 'w') boostOff();
  });

  // Touch
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const tx = touch.clientX;
      const ty = touch.clientY;

      if (state === 'title') { startGame(); return; }
      if (state === 'over') { startGame(); return; }

      if (state === 'playing') {
        if (tx < canvas.getBoundingClientRect().left + canvas.width / 2) {
          moveLeft();
        } else {
          moveRight();
        }
        if (ty < canvas.getBoundingClientRect().top + canvas.height * 0.4) {
          boostOn();
        }
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const ty = touch.clientY;
      if (ty < canvas.getBoundingClientRect().top + canvas.height * 0.4) {
        boostOn();
      } else {
        boostOff();
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    boostOff();
  }, { passive: false });

  // Mouse click for buttons
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (state === 'title' && canvas._startBtn) {
      const btn = canvas._startBtn;
      if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
        startGame();
      }
    }

    if (state === 'over' && canvas._restartBtn) {
      const btn = canvas._restartBtn;
      if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
        startGame();
      }
    }
  });

  function startGame() {
    resetGame();
    state = 'playing';
    lastFrameTime = performance.now();
  }

  // ──────────────────────────────────────
  // INIT
  // ──────────────────────────────────────
  function init() {
    resize();
    playerY = canvas.height * PLAYER_Y_RATIO;
    playerX = LANE_CX[playerLane];

    // Spawn initial trees
    for (let i = 0; i < 25; i++) {
      treesL.push(spawnTree('L'));
      treesR.push(spawnTree('R'));
    }

    // Draw initial frame
    render();
    lastFrameTime = performance.now();
    requestAnimationFrame(gameLoop);
  }

  init();
})();
</script>
</body>
</html>
