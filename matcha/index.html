<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Matcha — Memory Game</title>
  <meta name="description" content="A zen memory matching game — flip cards, find pairs, chain combos!">
  <meta property="og:title" content="Matcha — Memory Game">
  <meta property="og:description" content="A zen memory matching game — flip cards, find pairs, chain combos!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://amitsehgal29.github.io/games/matcha/">
  <meta property="og:image" content="https://amitsehgal29.github.io/games/matcha/icon.svg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #F5F0E8;
      display: flex; justify-content: center; align-items: center;
      font-family: 'Outfit', system-ui, sans-serif;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    canvas { display: block; max-width: 480px; width: 100%; border-radius: 16px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
  "use strict";

  // ═══════════════════════════════════════
  // CANVAS SETUP
  // ═══════════════════════════════════════
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const MAX_W = 480;
  const GAME_W = 400;

  function resize() {
    const w = Math.min(window.innerWidth, MAX_W);
    canvas.width = w;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function scaleX(x) { return x * (canvas.width / GAME_W); }
  function scaleV(v) { return v * (canvas.width / GAME_W); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function rand(min, max) { return min + Math.random() * (max - min); }
  function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function safeLS(key, val) {
    try {
      if (val !== undefined) { localStorage.setItem(key, String(val)); return; }
      return localStorage.getItem(key);
    } catch(e) { return null; }
  }

  // ═══════════════════════════════════════
  // COLORS — Warm zen palette
  // ═══════════════════════════════════════
  const C = {
    bg: '#F5F0E8', bgGrad1: '#F5F0E8', bgGrad2: '#EDE3D2',
    surface: '#F0E8D5',
    cardShadow: 'rgba(0,0,0,0.08)',
    cardBorder: 'rgba(0,0,0,0.06)',
    accent: '#2D5A27', accentGlow: 'rgba(45,90,39,0.3)',
    amber: '#D49830', amberGlow: 'rgba(212,152,48,0.3)',
    text: '#3A2A1A', textDim: '#8A7A6A', textMuted: '#B0A090',
    overlay: 'rgba(58,42,26,0.72)',
    overlayLight: 'rgba(245,240,232,0.92)',
    btnSuccess: '#4A7A44', btnDanger: '#C0392B',
    symColors: [
      '#2D5A27', '#D49830', '#4A4A8A', '#C0392B',
      '#D49090', '#C94A5A', '#7B5EA7', '#C89828',
      '#4A90D9', '#2A8A6A', '#A06040', '#6A8A4A',
      '#E07050', '#5090C0', '#80A040',
    ],
    peekGold: '#D4A030',
  };

  // ═══════════════════════════════════════
  // DIFFICULTY DEFINITIONS
  // ═══════════════════════════════════════
  const DIFFICULTIES = [
    { name: 'Easy',   cols: 4, rows: 4, pairs: 8,  label: 'EASY' },
    { name: 'Medium', cols: 6, rows: 4, pairs: 12, label: 'MEDIUM' },
    { name: 'Hard',   cols: 6, rows: 5, pairs: 15, label: 'HARD' },
  ];

  // ═══════════════════════════════════════
  // GAME STATE
  // ═══════════════════════════════════════
  let state = 'title';
  let cards = [];
  let difficulty = 0;
  let firstPick = -1, secondPick = -1;
  let matchedCount = 0, totalPairs = 6;
  let moves = 0, score = 0;
  let timer = 0, comboCount = 0, lastMatchTime = 0;
  let canTap = true, matchingPhase = false, lockTimer = 0, shakeTimer = 0;
  let particles = [], floatingTexts = [];
  let stars = 0;
  let highScores = [0, 0, 0];
  // Easter egg
  let titleTapTimes = [];
  let peekMode = false;

  // Audio
  let audioCtx = null, muted = true;
  let muteToggledByTouch = false;

  // Loop
  let elapsedTime = 0, lastFrameTime = performance.now();

  // ═══════════════════════════════════════
  // AUDIO
  // ═══════════════════════════════════════
  function initAudio() {
    if (!audioCtx) {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) { audioCtx = new AC(); if (audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{}); }
      } catch(e) { audioCtx = null; }
    } else if (audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    return audioCtx;
  }
  function playTone(f, e, d, t, v) {
    if (muted || !audioCtx) return;
    try {
      const ti = audioCtx.currentTime, o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = t || 'sine'; o.frequency.setValueAtTime(f, ti);
      if (e) o.frequency.linearRampToValueAtTime(e, ti + d);
      g.gain.setValueAtTime(v||0.1, ti); g.gain.exponentialRampToValueAtTime(0.001, ti+d);
      o.connect(g); g.connect(audioCtx.destination); o.start(ti); o.stop(ti+d);
    } catch(x) {}
  }
  function sfxFlip() { playTone(660, 880, 0.07, 'sine', 0.07); }
  function sfxMatch() {
    playTone(523, 659, 0.1, 'sine', 0.1);
    setTimeout(() => { playTone(659, 784, 0.1, 'sine', 0.1); }, 80);
    setTimeout(() => { playTone(784, 1047, 0.12, 'sine', 0.1); }, 160);
  }
  function sfxMismatch() { playTone(180, 100, 0.25, 'triangle', 0.09); }
  function sfxClick() { playTone(800, 600, 0.04, 'sine', 0.05); }
  function sfxWin() {
    playTone(523, 659, 0.1, 'sine', 0.1);
    setTimeout(() => { playTone(659, 784, 0.12, 'sine', 0.11); }, 100);
    setTimeout(() => { playTone(784, 1047, 0.14, 'sine', 0.12); }, 200);
    setTimeout(() => { playTone(1047, 1318, 0.18, 'sine', 0.13); }, 320);
  }
  function sfxEasterEgg() {
    playTone(440, 554, 0.15, 'sine', 0.08);
    setTimeout(() => { playTone(554, 659, 0.15, 'sine', 0.08); }, 100);
    setTimeout(() => { playTone(659, 880, 0.2, 'sine', 0.1); }, 200);
  }

  function toggleMute() {
    muted = !muted; safeLS('matcha_muted', muted?'1':'0'); initAudio();
  }

  // ═══════════════════════════════════════
  // GRID LAYOUT
  // ═══════════════════════════════════════
  function getGridBounds() {
    const d = DIFFICULTIES[difficulty];
    const padX = scaleX(20);
    const availW = canvas.width - padX * 2;
    const cellSize = Math.floor(availW / d.cols);
    const gapPx = scaleV(5);
    const cardSize = cellSize - gapPx;
    const gridWPx = cellSize * d.cols;
    const gridHPx = cellSize * d.rows;
    const gx = (canvas.width - gridWPx) / 2;
    const hudH = scaleV(52);
    const gy = Math.max(hudH + scaleV(8), (canvas.height - gridHPx) / 2);
    return { gx, gy, gridW: gridWPx, gridH: gridHPx, cellSize, cardSize, gap: gapPx, cols: d.cols, rows: d.rows };
  }

  function cellFromPoint(px, py) {
    const g = getGridBounds();
    const col = Math.floor((px - g.gx) / g.cellSize);
    const row = Math.floor((py - g.gy) / g.cellSize);
    if (col >= 0 && col < g.cols && row >= 0 && row < g.rows) return { row, col, idx: row * g.cols + col };
    return null;
  }

  function idxToCenter(idx) {
    const g = getGridBounds();
    const row = Math.floor(idx / g.cols);
    const col = idx % g.cols;
    return {
      x: g.gx + col * g.cellSize + g.cellSize / 2,
      y: g.gy + row * g.cellSize + g.cellSize / 2,
    };
  }

  // ═══════════════════════════════════════
  // CARD GENERATION
  // ═══════════════════════════════════════
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = randInt(0, i);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  function generateCards() {
    const d = DIFFICULTIES[difficulty];
    const symbols = [];
    for (let i = 0; i < d.pairs; i++) {
      symbols.push(i % C.symColors.length, i % C.symColors.length);
    }
    shuffle(symbols);
    return symbols.map((sym, idx) => ({
      id: idx,
      symbol: sym,
      faceUp: false,
      matched: false,
      flipAnim: 0,
      flipDir: 0,
      opacity: 1,
      scaleOut: 0,
    }));
  }

  // ═══════════════════════════════════════
  // SYMBOL DRAWING
  // ═══════════════════════════════════════
  function drawSymbol_circle(cx, cy, s, col) {
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(cx, cy, s * 0.62, 0, Math.PI * 2); ctx.fill();
  }
  function drawSymbol_diamond(cx, cy, s, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(cx, cy - s * 0.65); ctx.lineTo(cx + s * 0.65, cy);
    ctx.lineTo(cx, cy + s * 0.65); ctx.lineTo(cx - s * 0.65, cy);
    ctx.closePath(); ctx.fill();
  }
  function drawSymbol_star(cx, cy, s, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const r = i % 2 === 0 ? s * 0.65 : s * 0.28;
      const px = cx + Math.cos(a) * r, py = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
  }
  function drawSymbol_cross(cx, cy, s, col) {
    ctx.fillStyle = col;
    const t = s * 0.22;
    roundRect(cx - t, cy - s * 0.65, t * 2, s * 1.3, t * 0.4); ctx.fill();
    roundRect(cx - s * 0.65, cy - t, s * 1.3, t * 2, t * 0.4); ctx.fill();
  }
  function drawSymbol_triangle(cx, cy, s, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(cx, cy - s * 0.7);
    ctx.lineTo(cx + s * 0.62, cy + s * 0.48);
    ctx.lineTo(cx - s * 0.62, cy + s * 0.48);
    ctx.closePath(); ctx.fill();
  }
  function drawSymbol_heart(cx, cy, s, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(cx, cy + s * 0.6);
    ctx.bezierCurveTo(cx - s*0.9, cy + s*0.15, cx - s*0.55, cy - s*0.55, cx, cy - s*0.1);
    ctx.bezierCurveTo(cx + s*0.55, cy - s*0.55, cx + s*0.9, cy + s*0.15, cx, cy + s*0.6);
    ctx.fill();
  }
  function drawSymbol_crescent(cx, cy, s, col) {
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(cx, cy, s * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = C.surface;
    ctx.beginPath(); ctx.arc(cx + s * 0.22, cy - s * 0.14, s * 0.46, 0, Math.PI * 2); ctx.fill();
  }
  function drawSymbol_bolt(cx, cy, s, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(cx + s*0.12, cy - s*0.7);
    ctx.lineTo(cx - s*0.22, cy - s*0.05);
    ctx.lineTo(cx + s*0.06, cy - s*0.05);
    ctx.lineTo(cx - s*0.08, cy + s*0.7);
    ctx.lineTo(cx + s*0.32, cy + s*0.08);
    ctx.lineTo(cx + s*0.04, cy + s*0.08);
    ctx.closePath(); ctx.fill();
  }
  function drawSymbol_wave(cx, cy, s, col) {
    ctx.strokeStyle = col;
    ctx.lineWidth = s * 0.18; ctx.lineCap = 'round';
    ctx.beginPath();
    const w = s * 0.55;
    ctx.moveTo(cx - w, cy);
    ctx.quadraticCurveTo(cx - w*0.5, cy - w*0.55, cx, cy);
    ctx.quadraticCurveTo(cx + w*0.5, cy + w*0.55, cx + w, cy);
    ctx.stroke();
  }
  function drawSymbol_spiral(cx, cy, s, col) {
    ctx.strokeStyle = col;
    ctx.lineWidth = s * 0.14; ctx.lineCap = 'round';
    ctx.beginPath();
    for (let i = 0; i <= 36; i++) {
      const t = i / 36 * Math.PI * 2.8;
      const r = s * 0.04 + (s * 0.55) * (i / 36);
      const px = cx + Math.cos(t) * r, py = cy + Math.sin(t) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
  function drawSymbol_square(cx, cy, s, col) {
    ctx.fillStyle = col;
    const side = s * 1.05;
    roundRect(cx - side/2, cy - side/2, side, side, s * 0.12); ctx.fill();
  }
  function drawSymbol_hexagon(cx, cy, s, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
      const px = cx + Math.cos(a) * s * 0.65, py = cy + Math.sin(a) * s * 0.65;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
  }

  function drawSymbol_ring(cx, cy, s, col) {
    ctx.strokeStyle = col;
    ctx.lineWidth = s * 0.15;
    ctx.beginPath(); ctx.arc(cx, cy, s * 0.52, 0, Math.PI * 2); ctx.stroke();
  }
  function drawSymbol_dots(cx, cy, s, col) {
    ctx.fillStyle = col;
    const d = s * 0.28;
    [[-d,-d],[d,-d],[-d,d],[d,d]].forEach(([dx, dy]) => {
      ctx.beginPath(); ctx.arc(cx + dx, cy + dy, s * 0.1, 0, Math.PI*2); ctx.fill();
    });
  }
  function drawSymbol_arrow(cx, cy, s, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(cx, cy - s*0.65);
    ctx.lineTo(cx + s*0.5, cy);
    ctx.lineTo(cx + s*0.15, cy);
    ctx.lineTo(cx + s*0.15, cy + s*0.55);
    ctx.lineTo(cx - s*0.15, cy + s*0.55);
    ctx.lineTo(cx - s*0.15, cy);
    ctx.lineTo(cx - s*0.5, cy);
    ctx.closePath(); ctx.fill();
  }

  const SYMBOL_DRAW = [
    drawSymbol_circle, drawSymbol_diamond, drawSymbol_star, drawSymbol_cross,
    drawSymbol_triangle, drawSymbol_heart, drawSymbol_crescent, drawSymbol_bolt,
    drawSymbol_wave, drawSymbol_spiral, drawSymbol_square, drawSymbol_hexagon,
    drawSymbol_ring, drawSymbol_dots, drawSymbol_arrow,
  ];

  // Eagle eye icon (drawn on title screen)
  function drawEyeIcon(cx, cy, s) {
    ctx.fillStyle = C.peekGold;
    ctx.beginPath(); ctx.ellipse(cx, cy, s*0.55, s*0.38, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3A2A1A';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.22, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx + s*0.07, cy - s*0.05, s*0.07, 0, Math.PI*2); ctx.fill();
  }

  // ═══════════════════════════════════════
  // CARD DRAWING
  // ═══════════════════════════════════════
  function drawCard(card, idx) {
    if (card.opacity <= 0) return;
    const g = getGridBounds();
    const row = Math.floor(idx / g.cols);
    const col = idx % g.cols;
    const cx = g.gx + col * g.cellSize + g.cellSize / 2;
    const cy = g.gy + row * g.cellSize + g.cellSize / 2;
    const cs = g.cardSize; // full card visual size in px

    ctx.save();
    ctx.globalAlpha = card.opacity;

    // Scale out for matched cards
    let outScale = 1;
    if (card.scaleOut > 0) {
      outScale = 1 - card.scaleOut;
      if (outScale < 0) outScale = 0;
    }
    const sc = outScale;

    // Flip animation — vertical flip with lift
    let flipScaleY = 1;
    let liftY = 0;
    let showFace = card.faceUp;
    if (card.flipAnim > 0 && card.flipAnim < 1) {
      flipScaleY = Math.abs(Math.cos(card.flipAnim * Math.PI));
      if (flipScaleY < 0.05) flipScaleY = 0.05;
      // Forward flip (dir=1): show face in second half. Backward (dir=-1): show face in first half
      showFace = card.flipDir > 0 ? card.flipAnim >= 0.5 : card.flipAnim < 0.5;
      liftY = Math.sin(card.flipAnim * Math.PI) * cs * 0.1;
    }

    const w = cs * sc;
    const h = cs * flipScaleY * sc;
    const drawY = cy - liftY;

    // Shadow — deeper during flip
    if (sc > 0.1) {
      ctx.shadowColor = C.cardShadow;
      ctx.shadowBlur = scaleV(4) + (1 - flipScaleY) * scaleV(8);
      ctx.shadowOffsetY = scaleV(2) + (1 - flipScaleY) * scaleV(4);
    }

    if (showFace && !card.matched) {
      // Card front — cream
      ctx.fillStyle = C.surface;
      ctx.strokeStyle = C.cardBorder; ctx.lineWidth = scaleV(1);
      roundRect(cx - w/2, drawY - h/2, w, h, scaleV(6));
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;

      if (flipScaleY > 0.3 && sc > 0.5) {
        const symIdx = card.symbol % C.symColors.length;
        const colSym = C.symColors[symIdx];
        const symSize = cs * 0.26;
        SYMBOL_DRAW[symIdx](cx, drawY, symSize, colSym);
      }
    } else {
      // Card back — darker beige with green leaf
      const grad = ctx.createLinearGradient(cx - w/2, drawY - h/2, cx + w/2, drawY + h/2);
      grad.addColorStop(0, '#DDD2BC');
      grad.addColorStop(0.5, '#E8DFCD');
      grad.addColorStop(1, '#D8CCB5');
      ctx.fillStyle = grad;
      roundRect(cx - w/2, drawY - h/2, w, h, scaleV(6));
      ctx.fill();
      ctx.shadowBlur = 0;

      // Subtle golden accent in peek mode
      if (peekMode && flipScaleY > 0.5 && sc > 0.5) {
        ctx.strokeStyle = 'rgba(212,160,48,0.4)';
        ctx.lineWidth = scaleV(2);
        roundRect(cx - w/2 + scaleV(2), drawY - h/2 + scaleV(2), w - scaleV(4), h - scaleV(4), scaleV(5));
        ctx.stroke();
      }

      // Card back design — inner frame + green tea leaf
      if (flipScaleY > 0.3 && sc > 0.5) {
        const leafAlpha = 'rgba(45,90,39,';
        // Inner border
        ctx.strokeStyle = leafAlpha + '0.15)';
        ctx.lineWidth = scaleV(1);
        const inset = cs * 0.16;
        roundRect(cx - w/2 + inset, drawY - h/2 + inset, w - inset*2, h - inset*2, scaleV(3));
        ctx.stroke();
        // Tea leaf
        const leafH = cs * 0.28;
        const leafW = cs * 0.1;
        ctx.fillStyle = leafAlpha + '0.2)';
        ctx.beginPath();
        ctx.moveTo(cx, drawY - leafH);
        ctx.bezierCurveTo(cx + leafW, drawY - leafH*0.25, cx + leafW*0.8, drawY + leafH*0.6, cx, drawY + leafH);
        ctx.bezierCurveTo(cx - leafW*0.8, drawY + leafH*0.6, cx - leafW, drawY - leafH*0.25, cx, drawY - leafH);
        ctx.closePath();
        ctx.fill();
        // Leaf vein
        ctx.strokeStyle = leafAlpha + '0.25)';
        ctx.lineWidth = scaleV(0.7);
        ctx.beginPath();
        ctx.moveTo(cx, drawY - leafH + leafH*0.08);
        ctx.lineTo(cx, drawY + leafH*0.65);
        ctx.stroke();
        // Tiny stem
        ctx.beginPath();
        ctx.moveTo(cx, drawY + leafH);
        ctx.lineTo(cx, drawY + leafH + cs*0.08);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  // ═══════════════════════════════════════
  // PARTICLES & FLOATING TEXT
  // ═══════════════════════════════════════
  function spawnMatchParticles(pos1, pos2) {
    const midX = (pos1.x + pos2.x) / 2, midY = (pos1.y + pos2.y) / 2;
    for (let i = 0; i < 14; i++) {
      const angle = rand(0, Math.PI * 2);
      const speed = rand(1.5, 4.5);
      particles.push({
        x: midX, y: midY,
        vx: Math.cos(angle) * speed * scaleV(1),
        vy: Math.sin(angle) * speed * scaleV(1),
        life: rand(0.4, 0.8), maxLife: 0.8,
        size: rand(3, 5),
        color: C.symColors[randInt(0, C.symColors.length - 1)],
      });
    }
  }

  function spawnFloatingText(pos, text) {
    floatingTexts.push({ x: pos.x, y: pos.y, text: text, life: 1.2, maxLife: 1.2 });
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.5; // gravity
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function updateFloatingTexts(dt) {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const ft = floatingTexts[i];
      ft.life -= dt;
      ft.y -= scaleV(1.2);
      if (ft.life <= 0) floatingTexts.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, scaleV(p.size), 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawFloatingTexts() {
    floatingTexts.forEach(ft => {
      ctx.globalAlpha = clamp(ft.life / ft.maxLife, 0, 1);
      ctx.fillStyle = C.amber;
      ctx.font = `800 ${scaleV(16)}px 'Outfit', system-ui, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(ft.text, ft.x, ft.y);
    });
    ctx.globalAlpha = 1;
  }

  // ═══════════════════════════════════════
  // DRAWING — BACKGROUND
  // ═══════════════════════════════════════
  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, C.bgGrad1); grad.addColorStop(1, C.bgGrad2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle dot texture
    ctx.fillStyle = 'rgba(0,0,0,0.012)';
    for (let y = 0; y < canvas.height; y += scaleV(22)) {
      for (let x = 0; x < canvas.width; x += scaleV(22)) {
        ctx.beginPath();
        ctx.arc(x + (y % (scaleV(44)) === 0 ? scaleV(11) : 0), y, scaleV(0.7), 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // ═══════════════════════════════════════
  // DRAWING — TITLE SCREEN
  // ═══════════════════════════════════════
  function drawTitleScreen() {
    ctx.fillStyle = C.overlayLight; ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2, titleY = canvas.height * 0.18;

    // Decorative circles
    ctx.strokeStyle = 'rgba(45,90,39,0.06)'; ctx.lineWidth = scaleV(2);
    ctx.beginPath(); ctx.arc(cx, titleY + scaleV(10), scaleV(100), 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = 'rgba(45,90,39,0.04)';
    ctx.beginPath(); ctx.arc(cx, titleY + scaleV(10), scaleV(130), 0, Math.PI * 2); ctx.stroke();

    // Floating leaf decorations
    for (let i = 0; i < 8; i++) {
      const angle = elapsedTime * 0.25 + i * (Math.PI * 2 / 8);
      const lx = cx + Math.cos(angle) * scaleV(85);
      const ly = titleY + scaleV(5) + Math.sin(angle) * scaleV(50);
      ctx.fillStyle = `rgba(45,90,39,${0.04 + Math.sin(elapsedTime + i)*0.02})`;
      ctx.beginPath();
      ctx.ellipse(lx, ly, scaleV(7), scaleV(3.5), angle, 0, Math.PI * 2);
      ctx.fill();
    }

    // Title
    const titleGrad = ctx.createLinearGradient(cx, titleY - scaleV(25), cx, titleY + scaleV(35));
    titleGrad.addColorStop(0, '#2D5A27'); titleGrad.addColorStop(0.5, '#3E7A38'); titleGrad.addColorStop(1, '#1E3E18');
    ctx.fillStyle = titleGrad;
    ctx.font = `900 ${scaleV(50)}px 'Outfit', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Matcha', cx, titleY);

    // Subtitle
    ctx.fillStyle = C.textDim;
    ctx.font = `500 ${scaleV(13)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText('A memory matching game', cx, titleY + scaleV(38));

    // Difficulty tabs
    const tabY = titleY + scaleV(60);
    const tabH = scaleV(36), tabW = scaleX(88), tabGap = scaleV(6);
    const totalW = tabW * 3 + tabGap * 2;
    const tabStartX = cx - totalW / 2;

    canvas._diffTabs = [];
    DIFFICULTIES.forEach((d, i) => {
      const tx = tabStartX + i * (tabW + tabGap);
      const active = difficulty === i;
      if (active) {
        ctx.fillStyle = C.accent;
        roundRect(tx, tabY, tabW, tabH, tabH / 2); ctx.fill();
        ctx.fillStyle = '#FFF';
      } else {
        ctx.fillStyle = 'rgba(0,0,0,0.04)';
        roundRect(tx, tabY, tabW, tabH, tabH / 2); ctx.fill();
        ctx.fillStyle = C.textDim;
      }
      ctx.font = `700 ${scaleV(12)}px 'Outfit', system-ui, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(d.label, tx + tabW / 2, tabY + tabH / 2);
      canvas._diffTabs.push({ x: tx, y: tabY, w: tabW, h: tabH, diff: i });
    });

    // Grid preview
    const prevY = tabY + tabH + scaleV(12);
    const prevCellS = scaleV(14);
    const prevCols = DIFFICULTIES[difficulty].cols;
    const prevRows = DIFFICULTIES[difficulty].rows;
    const prevW = prevCols * (prevCellS + scaleV(3));
    const prevX = cx - prevW / 2;
    for (let r = 0; r < prevRows; r++) {
      for (let c = 0; c < prevCols; c++) {
        const px = prevX + c * (prevCellS + scaleV(3));
        const py = prevY + r * (prevCellS + scaleV(3));
        ctx.fillStyle = C.accent;
        ctx.globalAlpha = 0.5;
        roundRect(px, py, prevCellS, prevCellS, scaleV(2)); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = C.textMuted;
    ctx.font = `500 ${scaleV(10)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText(`${DIFFICULTIES[difficulty].pairs} pairs`, cx, prevY + prevRows * (prevCellS + scaleV(3)) + scaleV(12));

    // START button
    const btnW = scaleX(200), btnH = scaleV(52);
    const btnX = cx - btnW / 2;
    const btnY = prevY + prevRows * (prevCellS + scaleV(3)) + scaleV(28);
    const pulse = 1 + Math.sin(elapsedTime * 3) * 0.03;

    ctx.shadowColor = C.accentGlow; ctx.shadowBlur = scaleV(18) * pulse;
    const bg = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
    bg.addColorStop(0, C.accent); bg.addColorStop(1, '#1E3E18');
    ctx.fillStyle = bg;
    roundRect(btnX, btnY, btnW, btnH, btnH / 2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(btnX + scaleV(4), btnY + scaleV(2), btnW - scaleV(8), btnH / 2.5, btnH / 4); ctx.fill();

    ctx.fillStyle = '#FFF';
    ctx.font = `800 ${scaleV(18)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText('START', cx, btnY + btnH / 2);
    canvas._startBtn = { x: btnX, y: btnY, w: btnW, h: btnH };

    // High score
    const hsY = btnY + btnH + scaleV(20);
    if (highScores[difficulty] > 0) {
      const s = getStarsForScore(highScores[difficulty], difficulty);
      const starStr = '★'.repeat(s) + '☆'.repeat(3 - s);
      ctx.fillStyle = C.amber;
      ctx.font = `600 ${scaleV(12)}px 'Outfit', system-ui, sans-serif`;
      ctx.fillText(`Best: ${highScores[difficulty]}  ${starStr}`, cx, hsY);
    } else {
      ctx.fillStyle = C.textMuted;
      ctx.font = `500 ${scaleV(11)}px 'Outfit', system-ui, sans-serif`;
      ctx.fillText('No high score yet', cx, hsY);
    }

    // Eagle Eye indicator
    if (peekMode) {
      const eyeY = hsY + scaleV(22);
      drawEyeIcon(cx - scaleV(40), eyeY, scaleV(10));
      ctx.fillStyle = C.peekGold;
      ctx.font = `700 ${scaleV(11)}px 'Outfit', system-ui, sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText('Eagle Eye', cx - scaleV(26), eyeY);
    }

    }

  // ═══════════════════════════════════════

  function drawGameOverScreen() {
    ctx.fillStyle = C.overlay; ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = `${scaleV(26)}px 'Outfit', system-ui, sans-serif`;

    const cardW = scaleX(260), cardH = scaleV(80);

    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = scaleV(1);
    roundRect(cardX, cardY, cardW, cardH, scaleV(12)); ctx.fill(); ctx.stroke();

    ctx.textAlign = 'left';
    ctx.fillStyle = C.textMuted; ctx.font = `600 ${scaleV(13)}px 'Outfit', system-ui, sans-serif`;

    ctx.fillText('Moves', statXl, statY2);
    ctx.textAlign = 'right'; ctx.fillStyle = '#FFF';
    const mins = Math.floor(timer / 60), secs = Math.floor(timer % 60);
    ctx.fillText(`${mins}:${secs.toString().padStart(2, '0')}`, statXr, statY1);
    ctx.fillText(`${moves}`, statXr, statY2);

    const scoreY = cardY + cardH + scaleV(18);
    ctx.fillStyle = C.accent;
    ctx.font = `900 ${scaleV(28)}px 'Outfit', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`${score}`, cx, scoreY);

    // New high score
    const isNewBest = score > highScores[difficulty];
    if (isNewBest) {
      ctx.fillStyle = C.amber;
      ctx.font = `800 ${scaleV(15)}px 'Outfit', system-ui, sans-serif`;
      ctx.fillText('★ NEW HIGH SCORE! ★', cx, scoreY + scaleV(24));

    // Play Again button
    const btnW = scaleX(200), btnH = scaleV(48);
    const btnX = cx - btnW / 2;
    const btnY = scoreY + scaleV(44);

    bg.addColorStop(0, C.btnSuccess); bg.addColorStop(1, '#3A6A36');
    ctx.fillStyle = bg;
    roundRect(btnX, btnY, btnW, btnH, btnH / 2); ctx.fill();

    ctx.fillText('PLAY AGAIN', cx, btnY + btnH / 2);
    canvas._restartBtn = { x: btnX, y: btnY, w: btnW, h: btnH };

    // Change Difficulty button
    const cdBtnY = btnY + btnH + scaleV(12);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(btnX, cdBtnY, btnW, btnH, btnH / 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = scaleV(1.5);
    ctx.stroke();
    ctx.fillStyle = '#FFF';
    ctx.font = `700 ${scaleV(14)}px 'Outfit', system-ui, sans-serif`;
    ctx.fillText('CHANGE DIFFICULTY', cx, cdBtnY + btnH / 2);

  // ═══════════════════════════════════════
  // DRAWING — MUTE BUTTON
  // ═══════════════════════════════════════
  function drawSpeakerIcon(x, y, s, isMuted) {
    ctx.fillStyle = C.text;
    ctx.fillRect(x - s*0.35, y - s*0.18, s*0.2, s*0.36);
    ctx.beginPath();
    ctx.moveTo(x - s*0.15, y - s*0.24); ctx.lineTo(x + s*0.12, y - s*0.4);
    ctx.lineTo(x + s*0.12, y + s*0.4); ctx.lineTo(x - s*0.15, y + s*0.24);
    ctx.closePath(); ctx.fill();
    if (!isMuted) {
      ctx.strokeStyle = C.text; ctx.lineWidth = s*0.08; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(x + s*0.22, y, s*0.22, -0.4, 0.4); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + s*0.32, y, s*0.38, -0.4, 0.4); ctx.stroke();
    } else {
      ctx.strokeStyle = C.btnDanger; ctx.lineWidth = s*0.08; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x + s*0.24, y - s*0.25); ctx.lineTo(x + s*0.44, y + s*0.25); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + s*0.44, y - s*0.25); ctx.lineTo(x + s*0.24, y + s*0.25); ctx.stroke();
    }
  }

  function drawMuteButton() {
    const r = scaleV(22), x = scaleX(GAME_W - 20) - r, y = scaleV(85);
    canvas._muteBtn = { x: x - r*1.5, y: y - r*1.5, w: r*3, h: r*3 };
    ctx.fillStyle = 'rgba(255,250,242,0.7)';
    ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = scaleV(1);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    drawSpeakerIcon(x, y, r * 0.7, muted);
  }

  // ═══════════════════════════════════════
  // GAME LOGIC
  // ═══════════════════════════════════════
  function startGame() {
    state = 'playing';
    cards = generateCards();
    firstPick = -1; secondPick = -1;
    matchedCount = 0;
    totalPairs = DIFFICULTIES[difficulty].pairs;
    moves = 0; score = 0; timer = 0;
    comboCount = 0; lastMatchTime = 0;
    canTap = false; matchingPhase = false; lockTimer = 0; shakeTimer = 0;
    particles = []; floatingTexts = [];
    stars = 0;
    initAudio();
    // Eagle Eye: briefly reveal all cards
    if (peekMode) {
      cards.forEach(c => { c.faceUp = true; });
      setTimeout(() => {
        cards.forEach(c => { if (!c.matched) { c.faceUp = false; c.flipAnim = 0.001; c.flipDir = -1; } });
        canTap = true;
      }, 1500);
    } else {
      canTap = true;
    }
  }

  function getStarsForScore(sc, diff) {
    const d = DIFFICULTIES[diff];
    const perfectScore = d.pairs * 180;
    const threshold3 = perfectScore * 0.65;
    const threshold2 = perfectScore * 0.35;
    if (sc >= threshold3) return 3;
    if (sc >= threshold2) return 2;
    return 1;
  }

  function endGame() {
    state = 'over';
    sfxWin();
    stars = getStarsForScore(score, difficulty);
    if (score > highScores[difficulty]) {
      highScores[difficulty] = score;
      safeLS('matcha_hs_' + difficulty, String(score));
    }
  }

  function tapCard(idx) {
    if (state !== 'playing' || !canTap || lockTimer > 0) return;
    const card = cards[idx];
    if (!card || card.faceUp || card.matched || (card.flipAnim > 0 && card.flipAnim < 1)) return;

    initAudio(); sfxFlip();
    card.faceUp = true;
    card.flipAnim = 0.001;
    card.flipDir = 1;

    if (firstPick === -1) {
      firstPick = idx;
    } else {
      secondPick = idx;
      moves++;
      canTap = false;
      matchingPhase = true;
    }
  }

  function handleMatch() {
    const a = cards[firstPick], b = cards[secondPick];
    sfxMatch();

    // Combo tracking
    const timeSinceLast = timer - lastMatchTime;
    if (timeSinceLast < 2 && lastMatchTime > 0) {
      comboCount++;
    } else {
      comboCount = 1;
    }
    lastMatchTime = timer;

    // Score
    const speedBonus = Math.max(0, Math.floor(30 - timeSinceLast * 15)) * 2;
    const comboMult = 1 + (comboCount - 1) * 0.5;
    const pts = Math.floor((100 + speedBonus) * comboMult);
    score += pts;
    const pos = idxToCenter(firstPick);
    spawnFloatingText(pos, `+${pts}`);

    // Start scale-out animation for both cards
    a.scaleOut = 0.001;
    b.scaleOut = 0.001;
    a.matched = true;
    b.matched = true;
    matchedCount++;

    spawnMatchParticles(idxToCenter(firstPick), idxToCenter(secondPick));

    lockTimer = 0.45;
    firstPick = -1;
    secondPick = -1;

    if (matchedCount >= totalPairs) {
      setTimeout(() => { endGame(); }, 500);
    }
  }

  function handleMismatch() {
    sfxMismatch();
    comboCount = 0;
    shakeTimer = 0.35;
    lockTimer = 0.75;
  }

  function flipBackMismatch() {
    if (firstPick >= 0) {
      cards[firstPick].faceUp = false;
      cards[firstPick].flipAnim = 0.001;
      cards[firstPick].flipDir = -1;
    }
    if (secondPick >= 0) {
      cards[secondPick].faceUp = false;
      cards[secondPick].flipAnim = 0.001;
      cards[secondPick].flipDir = -1;
    }
    firstPick = -1;
    secondPick = -1;
    canTap = true;
    lockTimer = 0;
  }

  // ═══════════════════════════════════════
  // UPDATE
  // ═══════════════════════════════════════
  function update(dt) {
    const dtC = Math.max(0, Math.min(dt, 0.1));

    if (state === 'playing') {
      timer += dtC;

      // Advance flip animations
      cards.forEach(c => {
        if (c.flipAnim > 0 && c.flipAnim < 1) {
          c.flipAnim += dtC * 6;
          if (c.flipAnim >= 1) c.flipAnim = 1;
        }
        if (c.scaleOut > 0 && c.scaleOut < 1) {
          c.scaleOut += dtC * 3;
          if (c.scaleOut >= 1) { c.scaleOut = 1; c.opacity = 0; }
        }
      });

      // Check match after both cards finish flipping
      if (matchingPhase) {
        const a = cards[firstPick], b = cards[secondPick];
        if (a && b && a.flipAnim >= 1 && b.flipAnim >= 1) {
          matchingPhase = false;
          if (a.symbol === b.symbol) {
            handleMatch();
          } else {
            handleMismatch();
          }
        }
      }

      // Lock timer (after match effect or before flip-back)
      if (lockTimer > 0) {
        lockTimer -= dtC;
        if (lockTimer <= 0 && secondPick >= 0) {
          // Mismatch: flip back
          flipBackMismatch();
        }
        if (lockTimer <= 0 && firstPick === -1 && secondPick === -1) {
          canTap = true;
          lockTimer = 0;
        }
      }

      if (shakeTimer > 0) shakeTimer -= dtC;
    }

    updateParticles(dtC);
    updateFloatingTexts(dtC);
  }

  // ═══════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════
  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();

    if (state === 'title') {
      drawTitleScreen();
      drawMuteButton();
      return;
    }

    // Draw grid background
    if (state === 'playing' || state === 'over') {
      const g = getGridBounds();
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = scaleV(1);
      roundRect(g.gx - scaleV(6), g.gy - scaleV(6), g.gridW + scaleV(12), g.gridH + scaleV(12), scaleV(10));
      ctx.fill(); ctx.stroke();

      // Draw cards
      cards.forEach((card, idx) => {
        if (!card.matched || card.scaleOut < 1) {
          drawCard(card, idx);
        }
      });

      // Shake effect
      if (shakeTimer > 0) {
        ctx.save();
        const sx = (Math.random() - 0.5) * shakeTimer * scaleV(12);
        const sy = (Math.random() - 0.5) * shakeTimer * scaleV(12);
        ctx.translate(sx, sy);
        ctx.fillStyle = `rgba(192,57,43,${shakeTimer * 0.12})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      drawParticles();
      drawFloatingTexts();
      drawHUD();
    }

    if (state === 'over') {
      drawGameOverScreen();
    }

    drawMuteButton();
  }

  // ═══════════════════════════════════════
  // GAME LOOP
  // ═══════════════════════════════════════
  function gameLoop(ts) {
    const dt = (ts - lastFrameTime) / 1000;
    lastFrameTime = ts;
    elapsedTime += dt;
    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  // ═══════════════════════════════════════
  // INPUT
  // ═══════════════════════════════════════
  function checkEasterEgg() {
    const now = Date.now();
    titleTapTimes.push(now);
    titleTapTimes = titleTapTimes.filter(t => now - t < 3000);
    if (titleTapTimes.length >= 7) {
      peekMode = !peekMode;
      titleTapTimes = [];
      sfxEasterEgg();
      safeLS('matcha_peek', peekMode ? '1' : '0');
    }
  }
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    for (const t of e.changedTouches) {
      const tx = (t.clientX - rect.left) * (canvas.width / rect.width);
      const ty = (t.clientY - rect.top) * (canvas.height / rect.height);

      // Mute button always active
      if (canvas._muteBtn) {
        const b = canvas._muteBtn;
        if (tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) {
          muteToggledByTouch = true; toggleMute(); return;
        }
      }

      if (state === 'title') {
        // Difficulty tabs
        if (canvas._diffTabs) {
          for (const tab of canvas._diffTabs) {
            if (tx >= tab.x && tx <= tab.x + tab.w && ty >= tab.y && ty <= tab.y + tab.h) {
              difficulty = tab.diff; sfxClick(); return;
            }
          }
        }
        // Start button
        if (canvas._startBtn) {
          const b = canvas._startBtn;
          if (tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) {
            sfxClick(); startGame(); return;
          }
        }
        // Easter egg: rapid title taps
        checkEasterEgg();
        return;
      }

      if (state === 'over') {
        if (canvas._restartBtn) {
          const b = canvas._restartBtn;
          if (tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) { sfxClick(); startGame(); return; }
        }
        if (canvas._changeDiffBtn) {
          const b = canvas._changeDiffBtn;
          if (tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) { sfxClick(); state = 'title'; return; }
        }
        return;
      }

      if (state === 'playing') {
        const cell = cellFromPoint(tx, ty);
        if (cell) tapCard(cell.idx);
      }
    }
  }, { passive: false });

  canvas.addEventListener('click', e => {
    if (muteToggledByTouch) { muteToggledByTouch = false; return; }
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);

    if (canvas._muteBtn) {
      const b = canvas._muteBtn;
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) { toggleMute(); return; }
    }
    if (state === 'title') {
      if (canvas._diffTabs) {
        for (const tab of canvas._diffTabs) {
          if (mx >= tab.x && mx <= tab.x + tab.w && my >= tab.y && my <= tab.y + tab.h) { difficulty = tab.diff; sfxClick(); return; }
        }
      }
      if (canvas._startBtn) {
        const b = canvas._startBtn;
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) { sfxClick(); startGame(); return; }
      }
      checkEasterEgg();
    }
    if (state === 'over') {
      if (canvas._restartBtn) {
        const b = canvas._restartBtn;
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) { sfxClick(); startGame(); return; }
      }
      if (canvas._changeDiffBtn) {
        const b = canvas._changeDiffBtn;
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) { sfxClick(); state = 'title'; return; }
      }
    }
    if (state === 'playing') {
      const cell = cellFromPoint(mx, my);
      if (cell) tapCard(cell.idx);
    }
  });

  window.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (state === 'title') { sfxClick(); startGame(); }
      else if (state === 'over') { sfxClick(); startGame(); }
    }
    if (e.key === 'Escape') {
      if (state === 'playing') { state = 'title'; }
      else if (state === 'over') { state = 'title'; }
    }
  });

  // ═══════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════
  function init() {
    const savedMute = safeLS('matcha_muted');
    if (savedMute !== null) muted = savedMute === '1';
    const savedPeek = safeLS('matcha_peek');
    if (savedPeek !== null) peekMode = savedPeek === '1';

    for (let i = 0; i < 3; i++) {
      const hs = safeLS('matcha_hs_' + i);
      if (hs !== null) highScores[i] = parseInt(hs) || 0;
    }

    resize();
    render();
    lastFrameTime = performance.now();
    requestAnimationFrame(gameLoop);

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  init();
})();
</script>
</body>
